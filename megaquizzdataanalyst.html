<!--
  Synapse Learners — Entraînement des synapses
  Quiz interactif : 11 thèmes, séries de 10 questions.
  Les questions sont générées à partir du programme Data Analyst (méthode V.E.L.M.)
  via l'API Claude, puis mises en cache par série pour rester stables.
  Un fonds de questions vérifiées sert de filet de sécurité hors connexion.
-->
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

<style>
  :root {
    --violet:        #6d28d9;
    --violet-deep:   #5b21b6;
    --violet-bright: #7c3aed;
    --violet-soft:   #f5f3ff;
    --violet-grad:   linear-gradient(135deg, #7c3aed 0%, #5b21b6 100%);

    --ink:    #1e293b;
    --ink-2:  #0f172a;
    --muted:  #64748b;
    --muted-2:#94a3b8;

    --page:   #f4f3f8;
    --card:   #ffffff;
    --line:   #e9e7f0;
    --line-2: #eef2f7;

    --green:      #059669;
    --green-bd:   #6ee7b7;
    --green-bg:   #ecfdf5;
    --red:        #e11d48;
    --red-bd:     #fda4af;
    --red-bg:     #fff1f3;

    --radius:  20px;
    --radius-s:14px;
    --shadow:  0 18px 50px -22px rgba(76,29,149,.35);
    --shadow-s:0 6px 18px -10px rgba(15,23,42,.25);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background:
      radial-gradient(1200px 600px at 50% -10%, #efeafd 0%, rgba(239,234,253,0) 55%),
      var(--page);
    color: var(--ink);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  .wrap { max-width: 640px; margin: 0 auto; padding: 28px 18px 64px; }

  /* ---------- Brand header ---------- */
  .brand {
    display: flex; align-items: center; gap: 10px;
    font-family: "Poppins", sans-serif; font-weight: 700;
    font-size: 20px; color: var(--ink-2);
    margin: 6px 4px 16px;
  }
  .brand .logo { font-size: 22px; line-height: 1; filter: saturate(1.1); }
  .brand small {
    font-family: "Inter", sans-serif; font-weight: 500; font-size: 12px;
    color: var(--muted-2); margin-left: auto; letter-spacing: .02em;
  }

  /* ---------- Card ---------- */
  .card {
    position: relative; background: var(--card);
    border-radius: var(--radius); box-shadow: var(--shadow);
    border: 1px solid var(--line);
    overflow: hidden;
  }
  .card-pad { padding: 26px 26px 28px; }
  @media (max-width: 480px) { .card-pad { padding: 20px 18px 22px; } }

  /* gradient progress rail on top of the card */
  .rail { height: 6px; width: 100%; background: var(--line-2); }
  .rail > span {
    display: block; height: 100%; width: 0%;
    background: var(--violet-grad); border-radius: 0 4px 4px 0;
    transition: width .45s cubic-bezier(.22,1,.36,1);
  }

  /* ---------- Typography helpers ---------- */
  .eyebrow {
    font-family: "Poppins", sans-serif; font-weight: 600;
    font-size: 12px; letter-spacing: .14em; text-transform: uppercase;
    color: var(--violet); margin: 0 0 6px;
  }
  h1.title {
    font-family: "Poppins", sans-serif; font-weight: 800;
    font-size: 26px; line-height: 1.2; color: var(--ink-2); margin: 0 0 8px;
  }
  p.lede { font-size: 14.5px; color: var(--muted); margin: 0 0 20px; line-height: 1.55; }

  /* ---------- Buttons ---------- */
  .btn {
    appearance: none; border: 0; cursor: pointer; width: 100%;
    font-family: "Poppins", sans-serif; font-weight: 700; font-size: 15.5px;
    color: #fff; background: var(--violet); padding: 15px 18px;
    border-radius: var(--radius-s); transition: transform .12s ease, box-shadow .2s ease, background .2s ease;
    box-shadow: 0 10px 24px -12px rgba(109,40,217,.8);
  }
  .btn:hover { background: var(--violet-deep); transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn.ghost {
    background: #fff; color: var(--violet); border: 1.5px solid var(--line);
    box-shadow: none;
  }
  .btn.ghost:hover { background: var(--violet-soft); border-color: #ddd6fe; }
  .btn:focus-visible { outline: 3px solid #c4b5fd; outline-offset: 2px; }

  .backlink {
    display: inline-flex; align-items: center; gap: 6px; cursor: pointer;
    background: none; border: 0; padding: 4px 0; margin: 0 0 14px;
    color: var(--muted); font-family: "Inter"; font-weight: 600; font-size: 13.5px;
  }
  .backlink:hover { color: var(--violet); }

  /* ---------- Theme grid (home) ---------- */
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 480px) { .grid { grid-template-columns: 1fr; } }

  .tile {
    display: flex; align-items: center; gap: 13px; text-align: left;
    background: #fff; border: 1.5px solid var(--line); border-radius: var(--radius-s);
    padding: 14px 15px; cursor: pointer; transition: all .16s ease;
  }
  .tile:hover { border-color: #c4b5fd; background: var(--violet-soft); transform: translateY(-2px); box-shadow: var(--shadow-s); }
  .tile:focus-visible { outline: 3px solid #c4b5fd; outline-offset: 2px; }
  .tile .emoji {
    font-size: 22px; width: 42px; height: 42px; flex: none;
    display: grid; place-items: center; border-radius: 12px;
    background: var(--violet-soft);
  }
  .tile .meta { min-width: 0; }
  .tile .name { font-family: "Poppins"; font-weight: 600; font-size: 14.5px; color: var(--ink-2); }
  .tile .sub  { font-size: 12px; color: var(--muted-2); margin-top: 2px; }

  /* ---------- Series list ---------- */
  .series-head { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
  .series-head .emoji {
    font-size: 24px; width: 48px; height: 48px; flex: none;
    display: grid; place-items: center; border-radius: 13px; background: var(--violet-soft);
  }
  .series-list { display: grid; gap: 10px; margin-top: 18px; }
  .srow {
    display: flex; align-items: center; gap: 13px; text-align: left;
    background: #fff; border: 1.5px solid var(--line); border-radius: var(--radius-s);
    padding: 13px 15px; cursor: pointer; transition: all .16s ease;
  }
  .srow:hover { border-color: #c4b5fd; background: var(--violet-soft); transform: translateX(2px); }
  .srow:focus-visible { outline: 3px solid #c4b5fd; outline-offset: 2px; }
  .srow .num {
    font-family: "Poppins"; font-weight: 700; font-size: 14px; color: var(--violet);
    width: 40px; height: 40px; flex: none; display: grid; place-items: center;
    border-radius: 11px; background: var(--violet-soft); border: 1px solid #ede9fe;
  }
  .srow .stitle { font-family: "Poppins"; font-weight: 600; font-size: 14px; color: var(--ink-2); }
  .srow .sfocus { font-size: 12.5px; color: var(--muted); margin-top: 1px; }
  .srow .score-badge {
    margin-left: auto; flex: none; font-family: "Poppins"; font-weight: 700; font-size: 12px;
    padding: 4px 10px; border-radius: 999px;
  }
  .badge-green { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-bd); }
  .badge-amber { background: #fffbeb; color: #b45309; border: 1px solid #fcd34d; }
  .badge-arrow { margin-left: auto; color: var(--muted-2); font-size: 18px; }

  .hint {
    margin-top: 18px; font-size: 12.5px; color: var(--muted); line-height: 1.5;
    background: var(--violet-soft); border: 1px solid #ede9fe; border-radius: 12px; padding: 11px 13px;
  }
  .hint b { color: var(--violet-deep); }

  /* ---------- Quiz ---------- */
  .qtop { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .pill {
    font-family: "Poppins"; font-weight: 700; font-size: 13px; color: #fff;
    background: var(--violet); padding: 7px 15px; border-radius: 999px;
  }
  .score { font-family: "Poppins"; font-weight: 600; font-size: 14px; color: var(--muted); }
  .score b { color: var(--ink-2); }

  .question {
    font-family: "Poppins"; font-weight: 700; font-size: 19px; line-height: 1.42;
    color: var(--ink-2); margin: 2px 0 20px;
  }
  @media (max-width: 480px) { .question { font-size: 17.5px; } }

  .opts { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 560px) { .opts { grid-template-columns: 1fr; } }

  .opt {
    position: relative; text-align: left; cursor: pointer;
    background: #fff; border: 1.6px solid var(--line); border-radius: var(--radius-s);
    padding: 17px 16px; font-family: "Poppins"; font-weight: 600; font-size: 14.5px; color: var(--ink);
    transition: all .14s ease; min-height: 58px; display: flex; align-items: center;
  }
  .opt:hover:not(.locked) { border-color: #c4b5fd; background: var(--violet-soft); }
  .opt:focus-visible { outline: 3px solid #c4b5fd; outline-offset: 2px; }
  .opt.locked { cursor: default; }
  .opt.correct { border-color: var(--green-bd); background: var(--green-bg); color: var(--green); }
  .opt.wrong   { border-color: var(--red-bd);   background: var(--red-bg);   color: var(--red); }
  .opt .mark { margin-left: auto; padding-left: 10px; font-size: 16px; font-weight: 800; }

  .feedback {
    margin-top: 18px; background: #f8fafc; border: 1px solid var(--line-2);
    border-radius: var(--radius-s); padding: 16px 17px;
    animation: rise .28s cubic-bezier(.22,1,.36,1) both;
  }
  .feedback h4 {
    font-family: "Poppins"; font-weight: 800; font-size: 13px; letter-spacing: .04em;
    text-transform: uppercase; margin: 0 0 7px;
  }
  .feedback h4.ok { color: var(--green); }
  .feedback h4.no { color: var(--red); }
  .feedback p { margin: 0 0 14px; font-size: 14px; line-height: 1.55; color: var(--ink); }
  .feedback .btn { width: 100%; }

  /* ---------- Results ---------- */
  .result-top { text-align: center; padding: 8px 0 4px; }
  .scorb {
    width: 132px; height: 132px; border-radius: 50%; margin: 6px auto 18px;
    background: var(--violet-grad); display: grid; place-items: center;
    box-shadow: 0 22px 44px -18px rgba(91,33,182,.7);
    animation: pop .5s cubic-bezier(.34,1.56,.64,1) both;
  }
  .scorb span { font-family: "Poppins"; font-weight: 800; font-size: 40px; color: #fff; line-height: 1; }
  .scorb small { display:block; font-weight:600; font-size:13px; opacity:.85; margin-top:4px; }
  .result-top h2 { font-family: "Poppins"; font-weight: 800; font-size: 21px; color: var(--ink-2); margin: 0 0 12px; }
  .saved {
    display: inline-flex; align-items: center; gap: 7px; font-family: "Poppins"; font-weight: 600;
    font-size: 13px; color: var(--green); background: var(--green-bg);
    border: 1px solid var(--green-bd); padding: 7px 14px; border-radius: 999px;
  }
  .verdict { font-size: 14px; color: var(--muted); margin: 14px auto 0; max-width: 90%; line-height: 1.55; }

  .review { margin-top: 24px; display: grid; gap: 12px; }
  .rev {
    background: #fff; border: 1px solid var(--line); border-radius: var(--radius-s); padding: 16px 17px;
  }
  .rev .rq { font-family: "Poppins"; font-weight: 700; font-size: 14.5px; color: var(--ink-2); margin: 0 0 12px; line-height: 1.4; }
  .rev .line { display: flex; gap: 8px; font-size: 13.5px; margin: 4px 0; align-items: flex-start; }
  .rev .lab { font-family: "Poppins"; font-weight: 700; font-size: 11px; letter-spacing: .04em; text-transform: uppercase; color: var(--muted-2); flex: none; padding-top: 2px; min-width: 104px; }
  .rev .yours-no { color: var(--red); font-weight: 600; }
  .rev .yours-ok { color: var(--green); font-weight: 600; }
  .rev .good { color: var(--green); font-weight: 600; }
  .rev .why { margin-top: 12px; padding-top: 12px; border-top: 1px dashed var(--line); }
  .rev .why .lab2 { font-family: "Poppins"; font-weight: 700; font-size: 12.5px; color: var(--violet); margin: 0 0 4px; }
  .rev .why p { margin: 0; font-size: 13.5px; color: var(--muted); line-height: 1.55; }

  .result-actions { display: grid; gap: 10px; margin-top: 22px; }

  /* ---------- Loading ---------- */
  .loading { text-align: center; padding: 38px 10px; }
  .brainpulse { font-size: 46px; display: inline-block; animation: pulse 1.4s ease-in-out infinite; }
  .loading p { font-family: "Poppins"; font-weight: 600; color: var(--ink-2); margin: 14px 0 4px; font-size: 15px; }
  .loading small { color: var(--muted); font-size: 13px; }
  .dots::after { content: ""; animation: dots 1.4s steps(4,end) infinite; }

  .offline-tag {
    display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600;
    color: #b45309; background: #fffbeb; border: 1px solid #fcd34d; padding: 5px 11px; border-radius: 999px;
    margin-bottom: 14px;
  }

  @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  @keyframes pop  { from { opacity: 0; transform: scale(.7); } to { opacity: 1; transform: scale(1); } }
  @keyframes pulse{ 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.12); opacity: .7; } }
  @keyframes dots { 0% { content:""; } 25% { content:"."; } 50% { content:".."; } 75% { content:"..."; } }
  .screen-anim { animation: rise .3s ease both; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition: none !important; }
  }
</style>

<div class="wrap">
  <div class="brand">
    <span class="logo">🧠</span> Entraînement des synapses
    <small id="brandTotal"></small>
  </div>
  <div class="card">
    <div class="rail"><span id="rail"></span></div>
    <div class="card-pad" id="app"></div>
  </div>
</div>

<script>
/* =====================================================================
   1. PROGRAMME → THÈMES & SÉRIES
   Chaque série a un "focus" tiré du programme Data Analyst.
   Le "syllabus" sert d'amorce pour garder les questions dans le sujet.
   ===================================================================== */
const THEMES = [
  { id:"python", emoji:"🐍", label:"Python",
    syllabus:"Variables et types, mutabilité, opérateurs, conditions, boucles et itérateurs, chaînes, listes, tuples, dictionnaires, fonctions, slicing, tout-est-objet (POO), bibliothèque standard et modules.",
    series:["Variables & types","Mutables vs immuables","Opérateurs & conditions","Boucles & itérateurs","Chaînes de caractères","Listes & tuples","Dictionnaires","Fonctions","Slicing","POO : tout est objet","Modules & bibliothèque standard"] },

  { id:"sql", emoji:"🗄️", label:"SQL",
    syllabus:"Modélisation relationnelle, formes normales, clés primaires/étrangères, cardinalités, SELECT/WHERE/DISTINCT/ORDER BY, LIKE/BETWEEN/IN, opérateurs logiques, fonctions d'agrégation, GROUP BY, HAVING, jointures, sous-requêtes, vues, ordre d'exécution, DDL et index.",
    series:["Modélisation & formes normales","Clés & cardinalités","SELECT, WHERE, ORDER BY","LIKE, BETWEEN, IN","Agrégation & GROUP BY","HAVING vs WHERE","Jointures","Sous-requêtes","Vues","Ordre d'exécution des clauses","DDL : CREATE, ALTER, index"] },

  { id:"regex", emoji:"🔤", label:"Regex",
    syllabus:"Expressions régulières en Python : métacaractères, classes de caractères, quantificateurs, ancres, groupes, alternation, re.search/findall/sub, anonymisation RGPD, greedy vs lazy, lookahead/lookbehind, flags et compilation.",
    series:["Métacaractères & classes","Quantificateurs","Ancres & limites de mot","Groupes & alternation","Recherche & extraction","Substitution & anonymisation","Cas pratiques (email, tél, date)","Greedy vs lazy","Lookahead / lookbehind","Flags & re.compile"] },

  { id:"rgpd", emoji:"🛡️", label:"RGPD",
    syllabus:"RGPD pour data analyst : principes fondamentaux, bases légales, consentement, droits des personnes, données personnelles et sensibles, rôle du DPO, sécurisation, pseudonymisation vs anonymisation, responsabilités et sanctions.",
    series:["Principes fondamentaux","Bases légales & consentement","Droits des personnes","Données personnelles & sensibles","Le rôle du DPO","Pseudonymisation & anonymisation","Responsabilités & sanctions","RGPD au quotidien du data analyst"] },

  { id:"scraping", emoji:"🕸️", label:"Scraping",
    syllabus:"Web scraping : principes et cas d'usage, structure HTML/DOM, sélecteurs, requests, BeautifulSoup (find/find_all), extraction de texte et d'attributs, pagination multi-pages, légalité et robots.txt, bonnes pratiques anti-blocage.",
    series:["Principes & cas d'usage","HTML, DOM & sélecteurs","requests : récupérer la page","BeautifulSoup : find / find_all","Extraire texte & attributs","Pagination multi-pages","Légalité & robots.txt","Bonnes pratiques & éthique"] },

  { id:"api", emoji:"🔌", label:"API",
    syllabus:"API REST : concepts REST, méthodes HTTP (GET/POST/PUT/DELETE), codes de statut, format JSON, bibliothèque requests côté client, endpoints et routes, création d'API avec Flask, environnements virtuels, authentification.",
    series:["Concepts REST","Méthodes HTTP","Codes de statut HTTP","JSON, format d'échange","requests côté client","Endpoints & routes","Flask : créer une API","Environnements virtuels & sécurité"] },

  { id:"pandas", emoji:"🐼", label:"Pandas",
    syllabus:"Pandas : Series et DataFrame, lecture de données (read_csv/excel/html), head/tail/info, sélection et filtrage (loc/iloc/booléen), tri et inplace, création de colonnes, doublons et valeurs manquantes, concat/merge, groupby, describe, pivot_table, dates.",
    series:["Series & DataFrame","Lecture de données","head, tail, info, shape","Sélection & filtrage (loc/iloc)","Tri & inplace","Nouvelles colonnes & calculs","Doublons & valeurs manquantes","Concaténation & fusion","groupby & agrégations","describe & statistiques","Tableaux croisés (pivot_table)","Dates & séries temporelles"] },

  { id:"dataviz", emoji:"📊", label:"Dataviz",
    syllabus:"Visualisation : choisir le bon graphique selon la donnée, Matplotlib (plot/bar/scatter/hist), personnalisation, Seaborn (distribution, relation, catégoriel), boxplot, Plotly interactif et animations, Bokeh, accessibilité pour déficients visuels.",
    series:["Choisir le bon graphique","Matplotlib : les bases","Personnalisation (titres, axes)","Seaborn : distribution","Seaborn : relation & catégoriel","Boxplot & lecture","Plotly : interactif","Plotly : animation & avancé","Bokeh","Accessibilité visuelle"] },

  { id:"sklearn", emoji:"🤖", label:"Scikit-learn",
    syllabus:"Scikit-learn : train_test_split, fit/predict, régression linéaire (uni et multivariée), KNN, Naive Bayes, SVM, régression logistique, matrice de confusion, métriques (accuracy, precision, recall, F1), validation croisée, GridSearch, sur/sous-apprentissage.",
    series:["train_test_split","fit & predict","Régression linéaire","Classification : KNN","Naive Bayes & SVM","Régression logistique","Matrice de confusion","Métriques d'évaluation","Validation croisée","GridSearch & hyperparamètres","Sur- et sous-apprentissage"] },

  { id:"stats", emoji:"📐", label:"Statistiques",
    syllabus:"Statistiques descriptives et exploratoires : tendance centrale (moyenne, médiane, mode), dispersion (variance, écart-type, étendue), quartiles et IQR, boxplot et outliers, distributions et asymétrie, corrélation de Pearson, corrcoef NumPy, describe, histogrammes, covariance vs corrélation.",
    series:["Tendance centrale","Dispersion (écart-type, variance)","Quartiles & IQR","Boxplot & outliers","Distributions & asymétrie","Corrélation de Pearson","Matrice de corrélation (NumPy)","describe & interprétation","Histogrammes & densité","Covariance vs corrélation"] },

  { id:"dashboard", emoji:"📈", label:"Dashboard",
    syllabus:"Tableaux de bord & BI : principes d'un bon dashboard, KPI SMART, tableaux croisés dynamiques, Power BI, Tableau, hiérarchie de l'information, storytelling, accessibilité des tableaux de bord.",
    series:["Anatomie d'un bon dashboard","KPI SMART","Tableaux croisés dynamiques","Power BI : concepts","Tableau : concepts","Hiérarchiser l'information","Storytelling visuel","Accessibilité des dashboards"] },
];

const TOTAL_SERIES = THEMES.reduce((n,t)=>n+t.series.length,0);
document.getElementById("brandTotal").textContent = `${TOTAL_SERIES * 10}+ questions · ${TOTAL_SERIES} séries`;

/* =====================================================================
   2. FONDS DE SECOURS — questions vérifiées (mode hors connexion)
   Réponses contrôlées manuellement. "c" = index (0-3) de la bonne réponse.
   ===================================================================== */
const FALLBACK = {
  python: [
    /* S1 — Variables & types */
    [
      { q:"Comment le type d'une variable se définit-il au moment de l'affectation en Python ?", o:["Il doit être déclaré explicitement via un mot-clé de type","Il est inféré dynamiquement lors de l'exécution du script","Il est fixé définitivement dès la toute première affectation","Il est déterminé par des annotations obligatoires en en-tête"], c:1, e:"Python est à typage dynamique : le type est déduit de la valeur affectée et peut changer librement par la suite." },
      { q:"Que renvoie l'instruction type(42) dans l'interpréteur ?", o:["L'objet classe <class 'int'>","La chaîne de caractères 'int'","La valeur numérique 42 elle-même","L'objet structure <type 'integer'>"], c:0, e:"La fonction type() renvoie toujours l'objet classe représentant le type de la valeur. Pour 42, c'est <class 'int'>." },
      { q:"Quel est le type de retour exact du calcul 7 / 2 ?", o:["Un objet Decimal pour garantir la précision décimale","Un objet int valant 3, correspondant à la partie entière","Un objet float valant 3.5, issue de la division réelle","Une ValueError car 7 n'est pas strictement divisible par 2"], c:2, e:"En Python 3, l'opérateur de division classique (/) effectue toujours une division réelle et renvoie un float." },

  sql: [
    /* S1 — Modélisation & formes normales */
    [
      { q:"Dans le modèle relationnel, sous quelle forme structurée les données sont-elles agencées ?", o:["En graphes orientés de dépendance","En tables bidimensionnelles (lignes et colonnes)","En structures arborescentes hiérarchiques","En fichiers de texte brut séquentiels"], c:1, e:"Le modèle relationnel repose rigoureusement sur des tables (relations) composées de tuples (lignes) et d'attributs (colonnes)." },
      { q:"Que garantit précisément l'application de la première forme normale (1NF) ?", o:["L'absence totale de clés primaires composées","L'atomicité des valeurs contenues dans chaque cellule","La suppression définitive de toute redondance logique","L'indexation automatique des colonnes textuelles"], c:1, e:"La 1NF impose que chaque intersection ligne/colonne contienne une valeur atomique, c'est-à-dire indivisible et sans liste imbriquée." },
      { q:"Quel est l'objectif opérationnel majeur visé par la normalisation des bases de données ?", o:["Maximiser la vitesse brute des affichages graphiques","Réduire la redondance des données et prévenir les anomalies de manipulation","Permettre le chiffrement natif des colonnes sensibles","Supprimer la nécessité d'utiliser des clés étrangères"], c:1, e:"Normaliser vise à éliminer les anomalies d'insertion, de mise à jour et de suppression en évitant la duplication non maîtrisée." },
      { q:"Que représente concrètement une ligne (ou enregistrement) dans une table relationnelle ?", o:["Un attribut descriptif de l'entité","Une instance unique ou occurrence de l'entité modélisée","La structure globale de la relation","Une contrainte d'intégrité référentielle"], c:1, e:"Chaque ligne d'une table correspond à un enregistrement unique décrivant une entité concrète du monde réel." },
      { q:"Quelle est la fonction première d'une contrainte de clé primaire (PRIMARY KEY) ?", o:["Trier dynamiquement les enregistrements par ordre croissant","Garantir l'unicité et l'identification non nulle de chaque ligne","Établir une liaison logique vers une table distante","Chiffrer les données pour des raisons de sécurité"], c:1, e:"La clé primaire identifie de manière univoque chaque enregistrement d'une table et refuse strictement les valeurs NULL." },
      { q:"Que qualifie-t-on de « schéma » dans une base de données relationnelle ?", o:["La collection des données stockées à un instant T","L'architecture structurelle décrivant tables, types, colonnes et relations","Une requête d'interrogation précompilée","Une sauvegarde physique du serveur"], c:1, e:"Le schéma représente le plan d'architecture logique de la base de données, définissant ses tables, ses champs et ses liens." },
      { q:"À quoi correspond la pratique de la dénormalisation dans un SGBD ?", o:["À supprimer purement et simplement des tables obsolètes","À réintroduire volontairement de la redondance pour optimiser les performances de lecture","À ajouter des contraintes d'unicité sur les colonnes textuelles","À trier physiquement l'ensemble des données sur le disque"], c:1, e:"On dénormalise parfois de manière contrôlée pour limiter les jointures trop lourdes et accélérer les performances de lecture." },
      { q:"Comment définit-on une entité lors de la phase de modélisation conceptuelle ?", o:["Une colonne spécifique au sein d'une table","Un objet ou concept du monde réel matérialisé par une table","Une requête SQL complexe d'agrégation","Un index de recherche textuelle"], c:1, e:"Une entité conceptuelle (ex: Client, Commande) se traduit logiquement par une table dont les propriétés deviennent les colonnes." },
      { q:"Quel problème structurel majeur cherche à éliminer la troisième forme normale (3NF) ?", o:["La présence de valeurs multiples dans une même cellule","Les dépendances fonctionnelles transitives entre attributs non-clés","L'absence de clés primaires sur les tables filles","La lenteur d'exécution des clauses GROUP BY"], c:1, e:"La 3NF exige qu'aucun attribut non-clé ne dépende d'un autre attribut non-clé (suppression des dépendances transitives)." },
      { q:"Que matérialise une colonne dans une table relationnelle ?", o:["Un enregistrement complet","Un attribut ou champ caractérisant l'entité","Une relation de cardinalité multiple","Une base de données entière"], c:1, e:"Chaque colonne correspond à un attribut précis mesurant ou qualifiant l'entité représentée par la table." }
    ],
    /* S2 — Clés & cardinalités */
    [
      { q:"Quel est le rôle technique d'une clé étrangère (foreign key) ?", o:["Chiffrer les données sensibles d'une table à une autre","Créer un pont logique en référençant la clé primaire d'une autre table","Dupliquer automatiquement les données pour la sauvegarde","Créer un index d'accélération des recherches textuelles"], c:1, e:"La clé étrangère assure le lien relationnel en pointant vers la clé primaire d'une table cible." },
      { q:"Quel type de relation exprime la règle de gestion « un client passe plusieurs commandes » ?", o:["Une relation de type un-à-un (1:1)","Une relation de type un-à-plusieurs (1:N)","Une relation de type plusieurs-à-plusieurs (N:M)","Aucune relation n'est requise"], c:1, e:"Un client unique (côté 1) peut émettre de multiples commandes (côté N), traduisant une cardinalité 1:N." },
      { q:"De quelle manière modélise-t-on classiquement une relation de type plusieurs-à-plusieurs (N:M) ?", o:["En fusionnant les deux entités dans une seule table","En utilisant une table de jonction (ou d'association) intermédiaire","En créant un index composite unique","Il est impossible de modéliser ce type de relation en SQL"], c:1, e:"Une relation N:M se décompose obligatoirement à l'aide d'une table de jonction portant les clés étrangères des deux tables." },

      { q:"À quel moment est évaluée une sous-requête simple (non corrélée) ?", o:["Après l'exécution complète de la requête externe","Généralement avant la requête externe pour fournir son résultat d'évaluation","En même temps de façon synchrone obligatoire","Uniquement en cas d'erreur de la requête principale"], c:1, e:"Une sous-requête non corrélée est évaluée en amont, son résultat étant ensuite injecté dans la requête principale." }

    /* S9 — Vues */
    [
      { q:"Qu'est-ce qu'une vue (VIEW) en SQL ?", o:["Une copie physique et figée des données d'une table","Une table virtuelle dont le contenu est défini par une requête stockée","Un index d'accélération de recherche","Une sauvegarde complète de la base de données"], c:1, e:"Une vue est un objet de la base qui stocke une requête SELECT ; elle ne duplique pas les données." },
      { q:"Quelle commande SQL standard permet de créer une vue ?", o:["MAKE VIEW nom AS SELECT ...","CREATE VIEW nom AS SELECT ...","NEW VIEW nom AS SELECT ...","ADD VIEW nom AS SELECT ..."], c:1, e:"CREATE VIEW est l'instruction DDL standard pour enregistrer la structure d'une vue." },
      { q:"Une vue SQL classique stocke-t-elle physiquement les données sur le disque ?", o:["Oui, elle duplique les tables sources à chaque modification","Non, elle exécute dynamiquement sa requête source à chaque interrogation","Parfois, selon la taille des données","Toujours, pour des raisons de rapidité"], c:1, e:"Une vue classique ne contient aucune donnée physique : elle relance la requête sous-jacente à chaque appel." },
      { q:"Quel est l'intérêt opérationnel majeur de l'utilisation des vues ?", o:["Accélérer l'écriture physique des données sur le disque","Simplifier la lecture de requêtes complexes et masquer la complexité sous-jacente","Chiffrer automatiquement les informations sensibles","Supprimer la nécessité d'utiliser des clés primaires"], c:1, e:"Les vues encapsulent des requêtes élaborées (jointures, agrégations) derrière une interface de table simple." },
      { q:"De quelle manière les vues peuvent-elles contribuer à la sécurité des accès ?", o:["En chiffrant l'ensemble du disque dur du serveur","En n'exposant qu'un sous-ensemble filtré de colonnes ou de lignes aux utilisateurs","En supprimant les clés étrangères des tables sources","Elles n'ont aucun impact sur la sécurité"], c:1, e:"On restreint l'accès des utilisateurs à une vue sécurisée plutôt qu'aux tables brutes contenant des données sensibles." },
      { q:"Quelle instruction permet de supprimer proprement une vue existante ?", o:["DELETE VIEW nom","REMOVE VIEW nom","DROP VIEW nom","CLEAR VIEW nom"], c:2, e:"DROP VIEW est la commande DDL standard pour effacer la définition d'une vue." },
      { q:"Quel est l'état des données affichées lorsqu'on interroge une vue classique ?", o:["Elles sont figées à la date de création de la vue","Elles reflètent l'état actuel et mis à jour des tables sources sous-jacentes","Elles sont générées de manière totalement aléatoire","Elles sont toujours chiffrées"], c:1, e:"Puisque la requête est ré-exécutée à la volée, la vue affiche toujours les données actualisées des tables." },
      { q:"Comment interroge-t-on une vue au sein d'une instruction SQL ?", o:["Avec une syntaxe spécifique aux vues","Exactement de la même manière qu'une table classique via SELECT","Il est interdit de faire des SELECT sur une vue","En utilisant la commande OPEN VIEW"], c:1, e:"Une vue se comporte comme une table virtuelle : on peut l'interroger, y faire des jointures et des filtres via SELECT." },
      { q:"Une vue complexe intégrant des regroupements et des jointures multiples est-elle toujours modifiable (INSERT/UPDATE) ?", o:["Oui, toutes les vues acceptent les écritures","Non, la grande majorité des vues complexes reste en lecture seule","Jamais sous aucun prétexte technique","Oui, à condition d'utiliser un administrateur"], c:1, e:"Les vues contenant des agrégations, GROUP BY ou jointures multiples ne permettent généralement pas les opérations d'écriture." },
      { q:"En quoi une vue matérialisée diffère-t-elle fondamentalement d'une vue classique ?", o:["Elle n'existe pas en SQL standard","Elle stocke physiquement le résultat de sa requête et nécessite un rafraîchissement","Elle est toujours plus lente à l'exécution","Elle ne peut pas être interrogée par SELECT"], c:1, e:"Une vue matérialisée conserve les données sur le disque pour des performances accrues, nécessitant des rafraîchissements planifiés." }

    /* S10 — Ordre d'exécution des clauses */
    [
      { q:"Quelle clause d'une requête SQL est évaluée logiquement en tout premier par le SGBD ?", o:["SELECT","WHERE","FROM","ORDER BY"], c:2, e:"L'ordre d'évaluation logique commence toujours par identifier les sources de données via FROM (et les jointures)." },
      { q:"Immédiatement après l'analyse de la clause FROM, quelle instruction logique est exécutée ?", o:["SELECT","WHERE","ORDER BY","LIMIT"], c:1, e:"Le SGBD applique la clause WHERE pour restreindre le volume de lignes dès que les tables sont identifiées." },
      { q:"À quel moment précis intervient la clause GROUP BY dans l'ordre logique d'exécution ?", o: ["Avant l'application du filtre WHERE","Après le filtrage réalisé par le WHERE et avant la sélection","Après la projection des colonnes dans le SELECT","En tout dernier juste avant le tri final"], c:1, e:"Les lignes brutes sont d'abord filtrées (WHERE), puis regroupées par catégories (GROUP BY)." },
      { q:"À quel stade du traitement logique la clause SELECT (projection) est-elle exécutée ?", o:["En tout premier avant la lecture des tables","Après les opérations de filtrage, regroupement et filtrage de groupes (HAVING)","Avant la clause WHERE","En même temps que le FROM"], c:1, e:"La sélection des colonnes (SELECT) intervient tardivement dans le processus, après que les lignes ont été filtrées et agrégées." },
      { q:"Quelle clause est logiquement exécutée en tout dernier (juste avant un éventuel LIMIT) ?", o:["WHERE","FROM","ORDER BY","GROUP BY"], c:2, e:"ORDER BY trie le jeu de résultats finalisé, constituant la dernière étape avant la limitation du nombre de lignes." },
      { q:"Pourquoi est-il interdit d'utiliser un alias défini dans SELECT à l'intérieur de la clause WHERE ?", o:["Parce qu'il s'agit d'un bug historique des SGBD","Parce que la clause WHERE s'exécute logiquement avant le SELECT, l'alias n'existe pas encore","Parce que les alias textuels ralentissent l'exécution","Aucune raison technique, c'est une simple convention de style"], c:1, e:"Puisque WHERE s'exécute avant SELECT, les alias de colonnes projetées ne sont pas encore connus à ce stade." },
      { q:"Pour quelle raison l'utilisation d'un alias de SELECT est-elle permise dans la clause ORDER BY ?", o:["Parce que ORDER BY s'exécute chronologiquement après SELECT","C'est une exception qui ne fonctionne que sous MySQL","Parce que les alias sont dupliqués en mémoire en amont","Il est en réalité interdit d'utiliser un alias dans ORDER BY"], c:0, e:"ORDER BY s'exécutant en fin de traitement (après SELECT), il peut exploiter sans problème les alias de colonnes." },
      { q:"À quel moment précis du traitement s'applique la clause LIMIT ?", o: ["Avant l'exécution de la clause WHERE","Avant le tri des données","En toute fin de traitement, après la clause ORDER BY","En même temps que la clause GROUP BY"], c:2, e:"LIMIT tronque le résultat déjà filtré, agrégé et trié, intervenant en toute dernière position logique." },
      { q:"À quel stade s'exécute la clause HAVING par rapport au GROUP BY ?", o:["Avant la formation des groupes","Juste après le GROUP BY pour filtrer les agrégats","En même temps que le SELECT","En tout dernier après le tri"], c:1, e:"HAVING filtre les groupes formés par le GROUP BY : elle s'exécute donc immédiatement après." },
      { q:"L'ordre d'écriture textuelle d'une requête SQL correspond-il à son ordre d'exécution logique ?", o: ["Oui exactement, de gauche à droite","Non, l'ordre d'écriture (SELECT... FROM... WHERE) diffère de l'ordre d'exécution logique","Oui pour les requêtes simples, non pour les jointures","Seulement pour les moteurs basés sur MySQL"], c:1, e:"On écrit SELECT en premier, mais le moteur commence par analyser le FROM, puis le WHERE, puis le GROUP BY." }

      { q:"Quelle instruction DDL permet de générer une nouvelle table dans une base de données ?", o:["NEW TABLE","MAKE TABLE","CREATE TABLE","ADD TABLE"], c:2, e:"CREATE TABLE est la commande standard pour initialiser une table et définir ses colonnes." },
      { q:"Quelle commande permet d'altérer la structure d'une table existante, par exemple pour y ajouter un champ ?", o:[ "UPDATE TABLE","ALTER TABLE ... ADD COLUMN","MODIFY STRUCTURE","CREATE COLUMN"], c:1, e:"ALTER TABLE modifie la structure d'une table existante (ajout, suppression ou modification de colonnes)." },
      { q:"Quelle instruction supprime définitivement une table entière ainsi que sa structure et ses données ?", o:["DELETE TABLE","CLEAR TABLE","DROP TABLE","REMOVE TABLE"], c:2, e:"DROP TABLE efface irrévocablement la table et son contenu du schéma de la base." },
      { q:"Quel est l'objectif principal de la création d'un index sur une colonne ?", o:["Chiffrer le contenu de la colonne pour des raisons de sécurité","Accélérer considérablement les performances de recherche et de lecture","Empêcher l'insertion de valeurs NULL","Trier définitivement l'écriture physique sur le disque"], c:1, e:"Un index fonctionne comme l'index d'un livre : il accélère les recherches au détriment des écritures." },
      { q:"Quel est l'inconvénient majeur induit par la multiplication excessive d'index sur une table ?", o:["Aucun inconvénient, les performances sont toujours améliorées","Un ralentissement des opérations d'écriture (INSERT, UPDATE, DELETE) et une occupation mémoire accrue","L'interdiction absolue de réaliser des requêtes SELECT","La suppression automatique des clés primaires"], c:1, e:"Chaque index doit être mis à jour à chaque modification de données, ce qui pénalise les écritures." },
      { q:"Quelle contrainte de colonne interdit formellement la présence de valeurs vides ou absentes ?", o: ["UNIQUE","DEFAULT","NOT NULL","CHECK"], c:2, e:"NOT NULL impose qu'une valeur valide soit obligatoirement fournie pour chaque enregistrement inséré." },
      { q:"Quelle commande permet de vider l'intégralité des lignes d'une table très rapidement tout en conservant sa structure ?", o:["DROP","TRUNCATE","ALTER","DELETE sans WHERE"], c:1, e:"TRUNCATE supprime toutes les lignes de manière optimisée sans effacer la structure de la table." },
      { q:"Quelle syntaxe permet de déclarer une clé primaire lors de la création d'une table ?", o:["INDEX id","KEY id","PRIMARY KEY (id)","UNIQUE id only"], c:2, e:"PRIMARY KEY (id) déclare la colonne comme clé primaire au sein de l'instruction CREATE TABLE." },
      { q:"Quel type de données SQL standard est conçu pour stocker un nombre entier ?", o:["VARCHAR","DATE","INT","BOOLEAN"], c:2, e:"INT (ou INTEGER) est le type numérique standard pour stocker les nombres entiers." }
    ]

  regex: [
    /* S1 — Métacaractères & classes */
    [
      { q:"À quel type d'élément correspond le métacaractère d'échappement \\d dans un motif ?", o:["Un caractère alphabétique majuscule ou minuscule","Un chiffre décimal compris de 0 à 9","Un espace ou une tabulation","Un caractère de ponctuation standard"], c:1, e:"\\d est un raccourci qui matche n'importe quel chiffre décimal, équivalent à la classe [0-9]." },
      { q:"Que permet de cibler le métacaractère \\w au sein d'une expression régulière ?", o:["Un caractère de mot (lettres majuscules/minuscules, chiffres et underscore)","Uniquement les espaces blancs et les retours à la ligne","Uniquement les voyelles accentuées","La fin stricte d'une ligne de texte"], c:0, e:"\\w (word character) matche les lettres de a à z, de A à Z, les chiffres de 0 à 9 ainsi que le souligné (_)." },
      { q:"À quoi correspond précisément l'utilisation du métacaractère \\s ?", o:["Un chiffre décimal unique","Un caractère d'espacement (espace, tabulation, saut de ligne)","N'importe quel caractère alphanumérique","Une ancre de position en début de mot"], c:1, e:"\\s (whitespace) couvre tous les types d'espaces blancs, incluant les tabulations et les sauts de ligne." },
      { q:"Que représente le point (.) employé seul dans un motif d'expression régulière ?", o:["Un point littéral obligatoire","Un chiffre décimal","N'importe quel caractère à l'exception du saut de ligne","Le début d'une chaîne"], c:2, e:"Le point est un métacaractère joker qui matche n'importe quel caractère, sauf le saut de ligne (sauf si le flag DOTALL est actif)." },
      { q:"Que matche spécifiquement l'expression de classe [aeiou] ?", o:["Le mot entier 'aeiou'","Exactement une seule voyelle prise parmi l'ensemble spécifié","Toutes les voyelles de la chaîne à la suite","N'importe quel caractère alphabétique"], c:1, e:"Une classe de caractères délimitée par des crochets [...] correspond à un et un seul caractère présent dans cet ensemble." },
      { q:"Quel est le rôle du symbole accent circonflexe (^) placé à l'intérieur d'une classe de caractères ([^...]) ?", o:["Il ancre la recherche au début de la chaîne","Il inverse la sélection : il matche tout caractère n'appartenant pas à la classe","Il rend l'expression optionnelle","Il force la recherche insensible à la casse"], c:1, e:"Placé en première position dans les crochets, le ^ agit comme une négation (ex: [^0-9] matche tout sauf un chiffre)." },
      { q:"Que représente le métacaractère \\D par opposition à \\d ?", o:["Un chiffre décimal","Tout caractère qui n'est PAS un chiffre décimal","Une lettre majuscule","Un espace blanc"], c:1, e:"La majuscule inverse systématiquement le sens du raccourci : \\D matche tout sauf un chiffre (équivalent à [^0-9])." },
      { q:"Laquelle de ces classes de caractères est strictement équivalente au raccourci \\d ?", o:["[a-z]","[A-Z]","[0-9]","[^0-9]"], c:2, e:"La classe [0-9] définit explicitement l'intervalle des chiffres décimaux, ce qui correspond exactement à \\d." },
      { q:"Comment écrire un motif capable de matcher un point littéral de manière stricte ?", o:["En le plaçant entre crochets [.]","En utilisant le métacaractère joker .","En l'échappant avec un antislash (\\.)","En le faisant précéder d'un accent circonflexe"], c:2, e:"Puisque le point a un sens spécial de joker, il faut l'échapper avec un antislash (\\.) pour cibler un point réel." },
      { q:"Que matche l'expression de classe [A-Za-z] ?", o:["Un chiffre décimal unique","Une lettre alphabétique, qu'elle soit minuscule ou majuscule","Un espace ou une tabulation","Un symbole de ponctuation"], c:1, e:"La classe combine les intervalles de A à Z majuscules et de a à z minuscules, couvrant toutes les lettres." }
    ],
    /* S2 — Quantificateurs */
    [
      { q:"Que signifie le quantificateur astérisque (*) placé après un élément ?", o:["L'élément doit apparaître exactement une fois","L'élément est optionnel et peut apparaître zéro ou plusieurs fois","L'élément doit apparaître au moins une fois","L'élément doit apparaître au maximum deux fois"], c:1, e:"L'astérisque (*) autorise zéro, une ou plusieurs répétitions de l'élément situé immédiatement à sa gauche." },
      { q:"Que signifie le quantificateur plus (+) lorsqu'il est accolé à un élément ?", o:["Zéro ou plusieurs occurrences","Exactement une occurrence","Une ou plusieurs occurrences (au moins une)","Zéro ou une occurrence"], c:2, e:"Le signe plus (+) exige qu'il y ait au moins une occurrence de l'élément précédent, voire davantage." },
      { q:"Quel est le rôle du point d'interrogation (?) placé après un élément dans une regex ?", o:["Il force une répétition infinie","Il rend l'élément optionnel (zéro ou une seule fois)","Il inverse la correspondance de la classe","Il indique la fin de la chaîne"], c:1, e:"Le point d'interrogation (?) quantifie l'élément précédent en l'autorisant à être absent ou présent une seule fois." },
      { q:"Que spécifie exactement l'utilisation d'un quantificateur sous la forme {3} ?", o:["Entre 0 et 3 répétitions","Au maximum 3 répétitions","Exactement 3 répétitions consécutives","Au moins 3 répétitions"], c:2, e:"Les accolades avec un nombre unique {n} imposent une répétition stricte et exacte de n fois." },
      { q:"Que signifie un quantificateur de type {2,} ?", o:["Exactement 2 répétitions","Au maximum 2 répétitions","2 répétitions ou plus (sans limite supérieure)","Entre 0 et 2 répétitions"], c:2, e:"L'indication {2,} fixe une borne minimale de 2 occurrences, sans imposer de limite maximale." },
      { q:"Quel ensemble de répétitions est validé par le quantificateur {2,4} ?", o:["Exactement 24 répétitions","Entre 2 et 4 répétitions incluses","Soit 2, soit 4 répétitions, à l'exclusion de 3","Au moins 4 répétitions"], c:1, e:"L'intervalle fermé {min, max} autorise de min à max répétitions consécutives de l'élément." },
      { q:"Que matche précisément l'expression \\d+ ?", o:["Un unique chiffre","Une suite d'un ou plusieurs chiffres consécutifs","Zéro ou un chiffre","Une lettre alphabétique"], c:1, e:"Le raccourci \\d combiné au quantificateur + cible une chaîne continue d'un ou plusieurs chiffres." },
      { q:"Le motif a* peut-il réussir à matcher une chaîne de caractères totalement vide ?", o:["Non, car la lettre a est obligatoire","Oui, car l'astérisque accepte zéro occurrence","Non, il faut utiliser un signe plus (+) pour cela","Une erreur est levée en l'absence de texte"], c:1, e:"Puisque * autorise zéro occurrence, le motif a* valide une absence totale de la lettre 'a'." },
      { q:"Dans l'expression ab+, à quel élément s'applique précisément le quantificateur + ?", o:["À l'ensemble de la séquence ab","Uniquement à la lettre b","Uniquement à la lettre a","À la lettre a ou à la lettre b indifféremment"], c:1, e:"Un quantificateur en regex ne s'applique toujours qu'à l'élément unique situé immédiatement à sa gauche (ici b)." },
      { q:"Quel motif permet de valider de manière stricte une séquence de 5 chiffres (ex: code postal) ?", o:["\\d*","\\d+","\\d{5}","\\d{1,5}"], c:2, e:"L'utilisation stricte de {5} impose exactement cinq chiffres consécutifs, ni plus, ni moins." }
    ],
    /* S3 — Ancres & limites de mot */
    [
      { q:"Que représente l'ancre ^ placée au début d'un motif de recherche ?", o:["Une négation de classe","Le début strict de la chaîne ou de la ligne","La fin de la chaîne","Un chiffre décimal"], c:1, e:"Hors des crochets, l'accent circonflexe (^) est une ancre qui positionne la correspondance au tout début de la cible." },
      { q:"Quel est le rôle de l'ancre dollar ($) positionnée à la fin d'un motif ?", o:["Elle indique le début du traitement","Elle correspond à la fin stricte de la chaîne ou de la ligne","Elle matche un signe monétaire littéral","Elle ignore la casse"], c:1, e:"L'ancre $ garantit que le motif se termine exactement à la fin de la chaîne (ou de la ligne en mode multiligne)." },
      { q:"Que matche le métacaractère \\b au sein d'une expression régulière ?", o:["La lettre b minuscule","Un espace blanc obligatoire","Une limite (frontière) de mot","Le début d'une ligne"], c:2, e:"\\b (word boundary) est une assertion de position qui matche la frontière entre un caractère de mot (\\w) et un non-mot." },
      { q:"Que valide l'expression ^Bonjour ?", o:["La présence du mot 'Bonjour' n'importe où dans le texte","Le mot 'Bonjour' situé obligatoirement au tout début de la chaîne","Le mot 'Bonjour' situé obligatoirement en fin de chaîne","Une erreur de syntaxe liée à l'ancre"], c:1, e:"L'ancre ^ en tête impose que la chaîne commence immédiatement par le texte 'Bonjour'." },
      { q:"Que valide l'expression fin$ ?", o:["La chaîne 'fin' placée au début","La chaîne 'fin' placée obligatoirement en toute fin de texte","N'importe quelle occurrence du mot 'fin'","Une chaîne vide"], c:1, e:"L'ancre $ en queue de motif exige que le texte s'achève par le mot 'fin'." },
      { q:"De quelle nature sont les éléments représentés par les ancres ^ et $ ?", o:["Des caractères textuels visibles","Des positions géographiques sans consommation de caractères","Des chiffres obligatoires","Des séparateurs de mots"], c:1, e:"Les ancres sont des assertions de largeur nulle : elles vérifient une position dans le texte sans consommer le moindre caractère." },
      { q:"Que permet d'isoler de manière stricte le motif \\bchat\\b ?", o:["Toutes les occurrences textuelles contenant le mot 'chat', y compris 'chaton'","Uniquement le mot entier 'chat', à l'exclusion de 'chaton' ou 'chapeau'","Le mot 'chat' s'il est placé en début de ligne uniquement","Une erreur car l'antislash double est invalide"], c:1, e:"Les frontières \\b encadrant 'chat' interdisent qu'il soit englobé dans un mot plus vaste comme 'chaton'." },
      { q:"Que matche le motif minimaliste ^$ ? ", o:["N'importe quel texte","Une ligne de texte complètement vide","Un espace unique","Un saut de ligne"], c:1, e:"^$ exige un début de ligne immédiatement suivi d'une fin de ligne, ce qui correspond à une ligne vide." },
      { q:"Quel est le comportement du métacaractère d'assertion opposé \\B ?", o:["Il matche une frontière de mot","Il matche une position qui n'est PAS une limite de mot","Il matche une majuscule","Il matche un espace"], c:1, e:"\\B est l'exact opposé de \\b : il valide toute position qui se trouve à l'intérieur d'un mot." },
      { q:"Quel flag active-t-on pour que les ancres ^ et $ s'appliquent à chaque ligne d'un texte multiligne ?", o:["IGNORECASE","MULTILINE","DOTALL","VERBOSE"], c:1, e:"Le flag MULTILINE (ou re.M) redéfinit ^ et $ pour qu'ils ciblent aussi les sauts de ligne internes et non plus seulement les extrémités globales." }
    ],

      { q:"Quel est le rôle fondamental des parenthèses ( ) dans une expression régulière ?", o:["Échapper un caractère spécial","Créer un groupe capturant et isoler un sous-motif","Répéter une lettre indéfiniment","Nier une classe de caractères"], c:1, e:"Les parenthèses délimitent un sous-motif et enregistrent la portion de texte correspondante dans un groupe capturant." },
      { q:"Que symbolise le caractère barre verticale (|) dans un motif regex ?", o: ["Une négation stricte","Une alternative logique de type OU (alternation)","La fin obligatoire de la chaîne","Un groupe non capturant"], c:1, e:"Le pipe (|) sert d'alternance : il matche soit le motif situé à sa gauche, soit celui situé à sa droite." },
      { q:"Que matche le sous-motif (a|b)c ?", o: ["La chaîne abc uniquement","Soit la chaîne 'ac', soit la chaîne 'bc'","La chaîne 'a' suivie d'un choix b ou c","Une erreur de syntaxe liée aux parenthèses"], c:1, e:"Les parenthèses circonscrivent l'alternation. Le motif cherche soit 'a' suivi de 'c', soit 'b' suivi de 'c'." },
      { q:"À quoi sert spécifiquement la syntaxe non capturante (?:...) ?", o: ["À créer un groupe nommé récupérable","À regrouper un motif pour le quantifier sans mémoriser la capture","À rendre le motif insensible à la casse","À ignorer les espaces"], c:1, e:"(?:...) applique un regroupement logique (utile pour un quantificateur) sans encombrer la mémoire avec une capture." },
      { q:"Comment appelle-t-on le mécanisme permettant de réutiliser un groupe capturé au sein même du motif via \\1 ?", o: ["Une rétro-référence (backreference)","Un lookahead positif","Une substitution globale","Une compilation paresseuse"], c:0, e:"Une rétro-référence (\\1, \\2...) pointe vers le texte exact qui a été capturé par le groupe numéroté correspondant." },
      { q:"Quel est l'effet de l'inclusion d'un groupe capturant (\\d{4}) dans un motif de date ?", o:["D'ignorer purement et setCount cette portion","De capturer et mémoriser les 4 chiffres de l'année pour une extraction ultérieure","De forcer la présence d'un espace","De transformer les chiffres en lettres"], c:1, e:"En entourant \\d{4} de parenthèses, le moteur isole l'année afin qu'elle puisse être récupérée dans les résultats." },
      { q:"Que matche l'expression quantifiée (ab)+ ?", o: ["La lettre a suivie d'un b optionnel","Une ou plusieurs répétitions consécutives du bloc de caractères 'ab'","La lettre a répétée, puis la lettre b répétée","Une erreur car le quantificateur porte sur une parenthèse"], c:1, e:"Le quantificateur + s'applique à tout le groupe entre parenthèses, acceptant 'ab', 'abab', 'ababab', etc." },
      { q:"Quelle syntaxe Python spécifique permet de créer un groupe capturant NOMMÉ ?", o: ["(name:...)","(?P<name>...)","(<name>...)","{name:}"], c:1, e:"En Python, la syntaxe (?P<nom>...) attribue un nom explicite au groupe, facilitant sa récupération ultérieure." },
      { q:"Selon quelle règle les groupes capturants sont-ils numérotés par défaut ?", o: ["De droite à gauche selon la complexité","De gauche à droite en se basant sur l'ordre de leur parenthèse ouvrante","Par ordre alphabétique des correspondances","De manière aléatoire"], c:1, e:"L'attribution des numéros de groupes s'effectue séquentiellement de gauche à droite selon l'apparition de leur parenthèse ouvrante." },
      { q:"Que matche l'alternation chat|chien sans l'aide de parenthèses ?", o: ["Soit le mot 'chat', soit le mot 'chien' dans leur intégralité","Soit 'chat', soit 'chien' mais uniquement s'ils sont collés","Une erreur car l'alternation exige des parenthèses","Le mot 'chat' suivi d'un espace et de 'chien'"], c:0, e:"Sans parenthèses pour limiter sa portée, l'alternation s'applique à l'ensemble du motif de part et d'autre (donc 'chat' ou 'chien')." }

      { q:"Quelle est la distinction fondamentale entre re.match et re.search ?", o:["Aucune distinction, ce sont des synonymes parfaits","re.match exige que le motif corresponde obligatoirement dès le tout début de la chaîne","re.search ne fonctionne qu'avec des nombres","re.match retourne une liste de tuples"], c:1, e:"re.match() ancre implicitement la recherche au démarrage strict de la chaîne, contrairement à re.search()." },

      { q:"Que retourne l'appel de la méthode m.start() sur un objet match m ?", o: ["La longueur totale du texte extrait","L'indice numérique marquant le début de la correspondance dans la chaîne","Le numéro du groupe capturant","La fin de la chaîne analysée"], c:1, e:"La méthode .start() renvoie l'index (position de départ) de la correspondance au sein de la chaîne source." }

      { q:"Quel usage typique fait-on de re.sub dans le cadre de la conformité RGPD ?", o:["Compresser les fichiers de données","Anonymiser ou masquer des données personnelles (emails, numéros)","Trier les lignes par ordre alphabétique","Chiffrer le disque dur"], c:1, e:"re.sub() est l'outil parfait pour repérer des données personnelles et les remplacer par un libellé neutre (ex: '[MASQUÉ]')." },

      { q:"Que retourne la fonction apparentée re.subn(motif, remplacement, texte) ?", o:["Le texte modifié uniquement","Un tuple constitué de la chaîne modifiée et du nombre total de substitutions effectuées","Le nombre de remplacements sous forme d'entier","La liste des correspondances"], c:1, e:"re.subn() se comporte comme re.sub() mais retourne un tuple contenant le nouveau texte et le compteur de modifications." },

      { q:"Pourquoi l'utilisation des expressions régulières est-elle incontournable pour le nettoyage de données ?", o:["Pour accélérer la vitesse de calcul du processeur","Pour structurer, valider et assainir des formats de texte hétérogènes","Pour remplacer les bases de données SQL","Pour concevoir des interfaces graphiques"], c:1, e:"Les données textuelles brutes sont souvent sales ; les regex permettent d'extraire, formater et nettoyer efficacement." },
      { q:"Que réalise le nettoyage via l'instruction re.sub(r'\\s+', ' ', texte) ?", o:["Il supprime tous les espaces du texte","Il fusionne tous les espaces multiples (tabulations, retours, espaces) en un espace unique","Il décale le texte vers la droite","Il compte les espaces"], c:1, e:"Le motif \\s+ cible toute suite ininterrompue d'espaces blancs et les remplace par un unique espace (normalisation)." }

    /* S8 — Greedy vs lazy */
    [
      { q:"Quel est le comportement par défaut des quantificateurs (* et +) en termes de gourmandise ?", o:["Ils sont paresseux (lazy) et s'arrêtent au plus tôt","Ils sont gourmands (greedy) et capturent le maximum de caractères possible","Ils refusent de matcher plus d'un caractère","Ils alternent aléatoirement"], c:1, e:"Par défaut, les quantificateurs sont gourmands : ils avalent le plus de texte possible tout en permettant au reste du motif de matcher." },
      { q:"Comment transformer un quantificateur gourmand en quantificateur paresseux (lazy) ?", o:["En le faisant précéder d'un point d'interrogation","En ajoutant un point d'interrogation juste après lui (ex: *? ou +?)","En le mettant en majuscules","En doublant l'astérisque"], c:1, e:"Ajouter un ? après un quantificateur (*?, +?, ??, {n,m}?) bascule son comportement en mode paresseux (minimal)." },
      { q:"Que capture le motif gourmand <.*> appliqué à la chaîne de texte '<a><b>' ?", o:["Uniquement la première balise '<a>'","L'intégralité de la chaîne '<a><b>' en une seule correspondance","Uniquement la balise fermante '<b>'","Une erreur de syntaxe"], c:1, e:"Étant gourmand, .* avale tout, y compris le premier >, pour s'arrêter au dernier > possible de la chaîne." },
      { q:"Que capture le motif paresseux <.*?> appliqué à la chaîne '<a><b>' ?", o:["L'intégralité de la chaîne '<a><b>'","Uniquement la première balise '<a>' de manière isolée","La lettre 'a' uniquement","Aucune correspondance"], c:1, e:"Le mode paresseux (*?) s'arrête dès qu'il rencontre le premier symbole >, capturant ainsi strictement '<a>'." },
      { q:"Que signifie concrètement le qualificatif « paresseux » (lazy) pour un quantificateur ?", o:["Qu'il refuse de s'exécuter","Qu'il capture le minimum de caractères possible pour valider le motif","Qu'il s'endort en cas d'erreur","Qu'il supprime les espaces"], c:1, e:"Un quantificateur paresseux cherche à consommer le moins de caractères possible, quitte à s'étendre si la suite l'exige." },
      { q:"Comment appelle-t-on le mécanisme par lequel un quantificateur gourmand restitue des caractères s'il a pris trop de texte ?", o: ["Le backtracking (retour en arrière)","Le lookahead inversé","La compilation dynamique","La récursivité"], c:0, e:"Le backtracking est la capacité du moteur à battre en retraite pas à pas lorsque sa gourmandise empêche la fin du motif de matcher." },
      { q:"Que représente l'expression paresseuse .+? par rapport à .*?", o:["Zéro ou plusieurs caractères au minimum","Au moins un caractère, le plus peu possible (minimal)","Exactement deux caractères","Une négation"], c:1, e:".+? exige au moins un caractère (grâce au +) mais s'arrête dès que possible (grâce au ?)." },
      { q:"Dans quelle situation pratique privilégie-t-on l'usage d'un quantificateur paresseux ?", o:["Pour lire des fichiers binaires","Pour extraire du contenu situé entre deux balises ou délimiteurs identiques (ex: guillemets, balises HTML)","Pour valider des nombres entiers","Pour compter les lignes"], c:1, e:"Les quantificateurs paresseux sont indispensables pour isoler ce qui se trouve à l'intérieur de délimitations sans déborder." },
      { q:"Que capture le motif gourmand a.*b sur la chaîne de caractères 'axbxb' ?", o: ["La sous-chaîne 'axb'","La sous-chaîne complète 'axbxb' en allant jusqu'au tout dernier b","La lettre 'b' uniquement","Une erreur"], c:1, e:"Le .* gourmand pousse la correspondance jusqu'au dernier b possible de la chaîne ('axbxb')." },
      { q:"Quel est le piège classique associé à l'utilisation non maîtrisée du métacaractère .* ?", o:["Il s'exécute trop rapidement","Il a tendance à être trop gourmand et à avaler plus de texte que prévu","Il supprime les retours à la ligne","Il refuse de matcher du texte"], c:1, e:"Le .* avale sans crier gare tout ce qu'il trouve sur son passage, ce qui nécessite souvent d'être restreint par des limites ou la paresse." }

    /* S9 — Lookahead / lookbehind */
    [
      { q:"Quel est le rôle d'un lookahead positif noté (?=...) ?", o:["De consommer et d'extraire le texte spécifié","De vérifier qu'un motif suit la position courante, sans l'inclure dans le résultat","De regarder en arrière dans la chaîne","De remplacer le texte"], c:1, e:"Le lookahead positif est une assertion de largeur nulle : il valide ce qui suit sans le consommer." },
      { q:"Que vérifie l'assertion de lookahead négatif (?!...) ?", o: ["Que le motif spécifié suit obligatoirement la position courante","Que le motif spécifié NE suit PAS la position courante","Que le texte précédent est vide","Que la chaîne se termine"], c:1, e:"(?!...) s'assure que le sous-motif indiqué ne se trouve pas immédiatement après la position actuelle." },
      { q:"Quel est le rôle fondamental d'une assertion de lookbehind (?<=...) ?", o: ["De vérifier ce qui précède la position courante, sans le consommer","De vérifier ce qui suit la position","De capturer le texte précédent","De remplacer les caractères en amont"], c:0, e:"Le lookbehind regarde en arrière (derrière la position actuelle) pour valider une condition préalable sans l'extraire." },
      { q:"Que représente l'expression (?<!...) en matière de recherche par regex ?", o: ["Un lookahead négatif","Un lookbehind négatif (vérifie qu'un motif ne précède PAS la position)","Un groupe capturant standard","Un quantificateur paresseux"], c:1, e:"(?<!...) valide la position à condition que le motif indiqué ne précède pas immédiatement celle-ci." },
      { q:"Comment qualifie-t-on la famille des lookaheads et lookbehinds (assertions) ?", o: ["Des structures gourmandes","Des assertions de largeur nulle (ne consomment aucun caractère)","Des groupes capturants obligatoires","Des quantificateurs dynamiques"], c:1, e:"Ce sont des assertions de largeur nulle : elles testent une condition de position sans avancer ni inclure le texte dans le match." },
      { q:"Que matche le motif (?<=€)\\d+ appliqué à la chaîne « Prix : 50€ » ?", o: ["La chaîne '50€' en entier","Uniquement les chiffres '50' précédés d'un symbole euro, sans inclure le symbole","Le symbole '€' seul","Une erreur de syntaxe"], c:1, e:"Le lookbehind (?<=€) exige la présence d'un euro en amont, mais seuls les chiffres de \\d+ font partie du résultat capturé." },
      { q:"Que matche le motif \\d+(?= ?€) appliqué à « 50 € » ?", o: ["Le symbole euro '€' et les chiffres","Uniquement les chiffres '50' suivis d'un euro, sans capturer le symbole euro","Le texte complet","Rien"], c:1, e:"Le lookahead (?= ?€) valide la présence future de l'euro, mais la capture finale se limite aux chiffres de \\d+." },
      { q:"Quel est l'usage typique d'une combinaison de lookaheads pour la validation de mots de passe ?", o: ["Pour chiffrer le mot de passe","Pour vérifier simultanément la présence de chiffres, de majuscules et de symboles sans imposer d'ordre fixe","Pour trier les caractères","Pour inverser le texte"], c:1, e:"On enchaîne plusieurs lookaheads (?=.*[0-9]) (?=.*[A-Z]) pour valider des règles complexes sans consommer les caractères." },
      { q:"Quelle est la différence fondamentale entre lookahead et lookbehind ?", o: ["Aucune, les deux termes sont synonymes","Le lookahead analyse en avant (ce qui suit), le lookbehind analyse en arrière (ce qui précède)","L'un est paresseux, l'autre est gourmand","L'un est réservé à Python, l'autre à JavaScript"], c:1, e:"Lookahead = regarde devant la position ; Lookbehind = regarde derrière (en amont) la position." },
      { q:"Les caractères validés par l'intérieur d'une assertion de lookahead font-ils partie du résultat extrait ?", o: ["Oui, ils sont systématiquement inclus dans le match","Non, ils restent strictement en dehors de la portion extraite","Seulement s'ils sont numériques","Seulement si le flag MULTILINE est actif"], c:1, e:"Puisque les lookarounds sont de largeur nulle, ils servent uniquement de validateurs de position et n'entrent pas dans le résultat." }
    ],

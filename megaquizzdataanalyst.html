      { q:"À quoi sert la fonction re.compile(motif) en Python ?", o:["À exécuter immédiatement le script","À pré-compiler un motif sous forme d'objet réutilisable pour optimiser les performances","À effacer le motif de la mémoire","À traduire la regex en SQL"], c:1, e:"re.compile() analyse et compile le motif une seule fois, générant un objet pattern que l'on peut réutiliser en boucle." },
      { q:"Quel est l'intérêt principal de compiler un motif regex via re.compile lorsqu'il est répété souvent ?", o: ["Améliorer la lisibilité du code","Gagner en performance en évitant de réanalyser la chaîne du motif à chaque itération","Chiffrer l'expression","Réduire la taille du fichier source"], c:1, e:"La compilation en amont évite au moteur de refaire le travail d'analyse syntaxique du motif à chaque appel de fonction." },
      { q:"Quelle est la syntaxe correcte pour combiner deux flags (ex: IGNORECASE et MULTILINE) en Python ?", o: ["En les additionnant avec un plus (+)","En les combinant avec l'opérateur binaire OU (|) : re.I | re.M","En les séparant par une virgule","En créant une liste"], c:1, e:"Les flags se combinent nativement à l'aide de l'opérateur binaire bitwise OR (|)." },
      { q:"Une fois un objet motif compilé p = re.compile(r'\\d+'), comment lancer une recherche dans un texte ?", o: ["re.search(p, texte)","p.search(texte)","p(texte)","search(p, texte)"], c:1, e:"L'objet compilé expose directement les méthodes de recherche (p.search(), p.findall(), p.sub(), etc.)." },
      { q:"Quel est le rôle du flag re.VERBOSE (ou re.X) dans l'écriture d'une expression régulière ?", o: ["D'afficher des messages de débogage","D'écrire des motifs complexes sur plusieurs lignes, aérés avec des espaces et des commentaires","De vocaliser le résultat","D'accélérer l'exécution"], c:1, e:"VERBOSE ignore les espaces non échappés et les commentaires (#), permettant d'écrire des regex documentées et lisibles." },
      { q:"Que retourne l'évaluation de re.findall('a', 'AbA', re.IGNORECASE) ?", o: ["['a']","['A', 'A']","['a', 'A', 'a']","[]"], c:1, e:"Le flag IGNORECASE neutralise la casse : le motif 'a' trouve le 'A' majuscule initial et le 'A' final (soit deux occurrences)." },
      { q:"À quel endroit de la signature de fonction place-t-on généralement les flags de recherche comme re.search ?", o: ["En tout premier argument avant le motif","En dernier paramètre optionnel via l'argument flags=","Il est interdit d'utiliser des flags dans search","Au milieu du texte"], c:1, e:"Les fonctions du module re acceptent les flags en fin de signature, soit directement, soit via le paramètre nommé flags=." }
    ]
  ],
  rgpd: [
    /* S1 — Principes fondamentaux */
    [
      { q:"Que signifie exactement l'acronyme RGPD ?", o:["Référentiel Général des Pratiques Digitales","Règlement Général sur la Protection des Données","Règle Garantie de Partage Digital","Régulation Garantie pour la Protection des Données"], c:1, e:"RGPD = Règlement Général sur la Protection des Données, le texte de référence européen entré en vigueur en mai 2018." },
      { q:"Qu'impose concrètement le principe de « minimisation des données » ?", o:["De collecter un maximum d'informations par précaution","De ne collecter que les données strictement nécessaires au regard de la finalité","De réduire la taille des fichiers de stockage","De supprimer les bases de données tous les ans"], c:1, e:"La minimisation limite la collecte aux seules données adéquates, pertinentes et strictement utiles à l'objectif poursuivi." },
      { q:"Que stipule le principe de « limitation des finalités » ?", o:["Qu'une donnée collectée ne peut être réutilisée que pour un usage déterminé, explicite et légitime","Qu'il existe une limite de temps pour conserver les données","Que le nombre de finalités par entreprise est plafonné à trois","Qu'aucune finalité commerciale n'est tolérée"], c:0, e:"Les données doivent être collectées pour des buts précis et ne pas être détournées ultérieurement de cet objectif initial." },
      { q:"Quelle obligation recouvre le principe de « limitation de la conservation » ?",
      o:["De conserver les données pour une durée indéfinie","De ne pas conserver les données sous une forme permettant l'identification plus longtemps que nécessaire","De stocker les données sur des serveurs physiques fixes","De chiffrer l'ensemble des données archivées"], c:1, e:"Les données personnelles ne doivent pas être gardées plus longtemps que requis par la finalité du traitement." },
      { q:"Qu'exige le principe d'exactitude des données personnelles ?", o:["Que les données soient saisies rapidement","Que les données inexactes soient rectifiées, mises à jour ou effacées sans tarder","Que le format textuel respecte la casse","Que les fichiers ne contiennent aucune valeur nulle"], c:1, e:"L'organisme doit veiller à ce que les données soient exactes et, si nécessaire, tenues à jour." },
      { q:"Depuis quelle date précise le RGPD est-il directement applicable dans l'Union européenne ?", o:["Le 1er janvier 2015","Le 25 mai 2018","Le 1er janvier 2020","Le 12 décembre 2021"], c:1, e:"Le RGPD est pleinement applicable dans l'UE depuis le 25 mai 2018, après deux ans de période de transition." },
      { q:"Sur quoi insiste particulièrement le principe de transparence du RGPD ?", o:["Sur la nécessité de rendre les bases publiques","Sur l'obligation d'informer clairement les personnes sur l'usage de leurs données","Sur la transparence du code source des logiciels","Sur l'interdiction du secret des affaires"], c:1, e:"La transparence impose que les informations relatives au traitement soient communiquées aux personnes de façon claire et accessible." },
      { q:"Que garantit le principe d'« intégrité et de confidentialité » des données ?", o:["La rapidité des requêtes SQL","Des mesures de sécurité protégeant les données contre les accès non autorisés ou les pertes","L'absence totale de sauvegardes","Le partage libre des informations en interne"], c:1, e:"Ce principe impose de sécuriser les données par des mesures techniques et organisationnelles robustes." },
      { q:"Que recouvre le concept d'« accountability » (ou responsabilité) introduit par le RGPD ?", o:["L'obligation de blâmer l'utilisateur en cas d'erreur","La responsabilité de l'État dans le contrôle des serveurs","L'obligation pour l'organisme de respecter les règles ET de pouvoir le démontrer par des preuves","Le transfert de toute responsabilité au DPO"], c:2, e:"L'accountability exige non seulement d'être en conformité, mais de pouvoir le prouver (documentation, registres, audits)." },
      { q:"Le RGPD s'applique-t-il à une entreprise située hors de l'UE qui cible des résidents européens ?", o:["Non, seules les entreprises hébergées dans l'UE sont concernées","Oui, dès lors qu'elle traite des données de personnes physiques situées dans l'Union européenne","Seulement si l'entreprise possède une filiale physique en France","Uniquement dans le secteur bancaire et financier"], c:1, e:"Le RGPD possède une portée extraterritoriale : il s'applique dès qu'une entité cible des résidents de l'UE (offre de biens/services ou suivi de comportement)." }
    ],
    /* S2 — Bases légales & consentement */
    [
      { q:"Combien de bases légales le RGPD prévoit-il pour autoriser un traitement de données ?", o:["Une seule (le consentement obligatoire)","Exactement six","Dix bases distinctes","Trois bases principales"], c:1, e:"Le RGPD définit six bases légales : le consentement, le contrat, l'obligation légale, l'intérêt vital, la mission publique et l'intérêt légitime." },
      { q:"Quelles sont les qualités indispensables d'un consentement valable au sens du RGPD ?", o:["Il doit être tacite et groupé","Il doit être libre, spécifique, éclairé et univoque","Il doit être payant et signé","Il doit être définitif et irrévocable"], c:1, e:"Le consentement exige une démarche positive claire, sans contrainte, portant sur un usage précis et compréhensible." },
      { q:"Une case pré-cochée sur un formulaire en ligne constitue-t-elle un consentement valide ?", o:["Oui, si elle est accompagnée d'un astérisque","Non, le consentement exige un acte positif clair (ex: cocher soi-même une case vide)","Oui, dans le cadre d'un contrat commercial","Seulement pour les newsletters"], c:1, e:"Les cases pré-cochées et le silence ne constituent pas un consentement valide selon les critères du RGPD." },
      { q:"Une personne concernée peut-elle retirer son consentement à tout moment ?", o:["Non, le consentement est figé dès qu'il est accordé","Oui, et ce retrait doit être aussi simple que son expression initiale","Seulement par lettre recommandée avec accusé de réception","Uniquement après un délai de carence d'un an"], c:1, e:"Le retrait du consentement doit être libre, sans pénalité, et aussi facile à effectuer que son obtention." },
      { q:"Quel traitement de données relève de la base légale de l'« exécution d'un contrat » ?", o:["L'envoi de publicités ciblées non sollicitées","Le traitement des données bancaires et de livraison pour expédier un achat en ligne","La conservation des factures pour l'administration fiscale","L'analyse des statistiques de navigation anonymes"], c:1, e:"Traiter les coordonnées nécessaires pour honorer une commande validée repose sur la base contractuelle." },
      { q:"La conservation obligatoire de documents comptables et fiscaux relève de quelle base légale ?", o:["Le consentement explicite du client","L'intérêt légitime de l'entreprise","L'obligation légale imposée par la loi","L'intérêt vital de la nation"], c:2, e:"L'obligation légale couvre les traitements imposés par un texte de loi (comme les obligations fiscales ou comptables)." },
      { q:"Que nécessite l'utilisation de la base légale de l'« intérêt légitime » ?", o:["Le paiement d'une taxe à la CNIL","Une mise en balance approfondie entre les intérêts de l'entreprise et les droits de la personne","Un accord écrit et signé par la préfecture","L'anonymisation irréversible préalable de toutes les données"], c:1, e:"L'intérêt légitime impose de vérifier que l'intérêt de l'organisme ne porte pas une atteinte disproportionnée aux libertés de la personne." },
      { q:"Quelle base légale justifie le traitement de données médicales d'urgence pour sauver une vie ?", o:["Le contrat commercial","L'intérêt vital","La mission d'intérêt public","Le consentement tacite"], c:1, e:"L'intérêt vital s'applique dans les situations d'urgence absolue où la vie de la personne est en jeu." },
      { q:"Le recueil du consentement doit-il être global pour l'ensemble des activités d'un site ?", o:["Oui, un seul accord vaut pour tout","Non, il doit être spécifique et distinct pour chaque finalité de traitement","Uniquement pour les mineurs","La loi n'impose aucune règle de granularité"], c:1, e:"Le consentement doit être granulaire : on ne peut regrouper plusieurs finalités sous un accord unique." },
      { q:"Comment le RGPD encadre-t-il le traitement des données des mineurs en ligne ?", o:["Il l'interdit totalement et sans exception","Il l'encadre strictement et requiert l'autorisation parentale en deçà d'un certain âge","Il dispense les mineurs de toute règle de protection","Il assimile les mineurs à des entreprises"], c:1, e:"Le RGPD protège spécifiquement les mineurs : en dessous d'un seuil d'âge fixé par les États (entre 13 et 16 ans), l'accord des parents est requis." }
    ],
    /* S3 — Droits des personnes */
    [
      { q:"Que permet d'exercer le « droit d'accès » pour une personne physique ?", o:["De modifier directement la loi en vigueur","D'obtenir la confirmation que ses données sont traitées et d'en obtenir une copie","De supprimer définitivement l'entreprise visée","De revendre ses données personnelles à des tiers"], c:1, e:"Le droit d'accès permet à chacun de savoir si des données le concernant sont traitées et d'en obtenir communication." },
      { q:"Quel est l'objectif du droit de rectification ?", o: ["Effacer l'intégralité de son historique numérique","Faire corriger des données personnelles inexactes ou incomplètes","Transférer ses données vers un concurrent","Bloquer un compte bancaire"], c:1, e:"Le droit de rectification permet d'exiger la mise à jour ou la correction d'informations erronées." },
      { q:"Sous quel autre nom désigne-t-on couramment le droit à l'effacement ?", o:["Le droit à l'oubli","Le droit de portabilité","Le droit d'opposition absolue","Le droit de rétractation financière"], c:0, e:"Le droit à l'effacement est communément appelé « droit à l'oubli », permettant de demander la suppression de ses données." },
      { q:"Que permet de réaliser le « droit à la portabilité des données » ?", o:["De déplacer physiquement les serveurs informatiques","De récupérer ses données dans un format structuré, couramment utilisé et lisible par machine pour les transmettre ailleurs","D'imprimer l'ensemble de son dossier client","D'effacer définitivement son profil sans délai"], c:1, e:"La portabilité offre la possibilité de récupérer ses données pour les réutiliser ou les transférer vers un autre service." },
      { q:"Que confère le « droit d'opposition » à la personne concernée ?", o:["Le droit de s'opposer à certains traitements, notamment à la prospection commerciale","Le droit de s'opposer à toute décision de justice","Le droit de modifier les codes sources des applications","Le droit de refuser de payer ses impôts"], c:0, e:"Le droit d'opposition permet de refuser que ses données soient utilisées à certaines fins, comme la prospection." },
      { q:"Dans quel délai théorique un organisme doit-il répondre à une demande d'exercice de droits ?", o:["Dans les 48 heures ouvrées","Dans un délai d'un mois (extensible à trois mois en cas de forte complexité)","Dans un délai fixe d'un an","Aucun délai n'est spécifié par la loi"], c:1, e:"L'organisme dispose d'un mois maximum pour répondre, prolongeable de deux mois pour les demandes complexes." },
      { q:"L'exercice des droits par une personne auprès d'un organisme est-il payant ?", o:["Oui, soumis à un timbre fiscal","Non, c'est en principe gratuit (sauf abus manifestes)","Oui, en cas de demande de portabilité","Uniquement pour les entreprises cotées"], c:1, e:"L'exercice des droits est gratuit pour la personne, l'organisme ne pouvant facturer qu'en cas de demandes manifestement abusives ou répétitives." },
      { q:"Quel est l'effet du « droit à la limitation du traitement » ?", o: ["De supprimer définitivement les données du serveur","De « geler » temporairement l'utilisation des données sans les effacer","De doubler la vitesse de traitement informatique","D'archiver les données sur support papier"], c:1, e:"La limitation gèle l'utilisation des données, qui restent stockées mais ne sont plus activement traitées." },
      { q:"Une personne peut-elle s'opposer à une décision prise exclusivement par un algorithme (automatisée) ?", o:["Non, l'intelligence artificielle a toujours raison","Oui, elle peut exiger une intervention humaine, exprimer son point de vue et contester la décision","Seulement dans le secteur de la santé","Jamais"], c:1, e:"Le RGPD encadre strictement le profilage et les décisions 100 % automatisées ayant des effets juridiques." },
      { q:"À quel moment précis l'organisme doit-il informer la personne de ses droits ?", o:["Uniquement en cas de litige judiciaire","Au moment même de la collecte des données personnelles","Après un délai de conservation de 5 ans","À la fermeture de l'entreprise"], c:1, e:"L'information doit être délivrée au moment de la collecte (via des mentions informatives ou une politique de confidentialité)." }
    ],
    /* S4 — Données personnelles & sensibles */
    [
      { q:"Comment le RGPD définit-il une « donnée personnelle » ?", o:["Uniquement le nom, le prénom et le numéro de téléphone","Toute information se rapportant à une personne physique identifiée ou identifiable","Seules les données bancaires et fiscales","Les données financières d'une entreprise tierce"], c:1, e:"Constitue une donnée personnelle toute info permettant d'identifier directement ou indirectement une personne physique." },
      { q:"Une adresse IP ou un identifiant de cookies sont-ils considérés comme des données personnelles ?", o:["Non, ce sont des données purement techniques","Oui, car ils permettent d'identifier indirectement un utilisateur","Seulement s'ils sont associés à une carte bancaire","Uniquement sur le territoire français"], c:1, e:"L'adresse IP et les identifiants numériques peuvent mener à une personne : ce sont des données personnelles." },
      { q:"Parmi ces catégories, lesquelles constituent des « données sensibles » (particulières) au sens du RGPD ?", o:["Le code postal et la ville de résidence","La santé, les opinions politiques, les convictions religieuses et l'orientation sexuelle","Le niveau de diplôme et l'intitulé du poste","Le mode de transport domicile-travail"], c:1, e:"L'article 9 du RGPD liste les données sensibles : origine, opinions, religion, santé, orientation sexuelle, biométrie." },
      { q:"Quel est le régime juridique applicable au traitement des données sensibles ?", o:["Elles sont totalement libres d'accès pour les entreprises","Elles sont par principe interdites de traitement, sauf exceptions très strictes encadrées par la loi","Elles doivent obligatoirement être publiées en open data","Elles ne peuvent être traitées que par les banques"], c:1, e:"Le traitement des données sensibles est interdit par défaut, sauf dérogations précises (ex: consentement explicite, urgence médicale)." },
      { q:"Une donnée entièrement et irréversiblement anonymisée est-elle soumise au RGPD ?", o:["Oui, le RGPD s'applique à tout ce qui provient d'un humain","Non, l'anonymisation irréversible fait sortir la donnée du champ du RGPD","Seulement si elle est stockée en Europe","Uniquement pendant une période de 3 ans"], c:1, e:"Dès lors qu'il est impossible d'identifier la personne (anonymisation réelle), le RGPD ne s'applique plus." },
      { q:"Les données biométriques (empreintes digitales, reconnaissance faciale) sont-elles des données sensibles ?", o:["Non, ce sont des données techniques banales","Oui, dès lors qu'elles permettent d'identifier de manière unique une personne physique","Seulement dans les aéroports","Uniquement si elles sont stockées en clair"], c:1, e:"Les données biométriques et génétiques destinées à identifier une personne physique relèvent des catégories particulières." },
      { q:"Le numéro de sécurité sociale (NIR) est-il encadré de manière spécifique ?", o:["Non, c'est une donnée publique","Oui, c'est une donnée personnelle hautement sensible dont l'usage est strictement réglementé","Il est interdit de l'utiliser sous aucun prétexte","Il est assimilé à un simple mot de passe"], c:1, e:"Le numéro de sécurité sociale bénéficie d'un encadrement rigoureux et restrictif quant aux autorisations de traitement." },
      { q:"Est-il possible d'identifier une personne de manière « indirecte » ?", o:["Non, l'identification directe est la seule reconnue","Oui, par le croisement et le recoupement de plusieurs informations (ex: âge, commune, profession)","Seulement en piratant les serveurs de l'État","Jamais"], c:1, e:"Le recoupement de critères anodins pris séparément peut suffire à ré-identifier un individu de façon univoque." },
      { q:"Les données concernant des personnes morales (entreprises, associations) entrent-elles dans le champ du RGPD ?", o:["Oui, le RGPD protège les entreprises au même titre que les humains","Non, le RGPD protège exclusivement les personnes physiques","Seulement pour les petites entreprises de moins de 10 salariés","Uniquement en cas de faillite"], c:1, e:"Le RGPD ne s'applique qu'aux données des personnes physiques vivantes, excluant les données purement corporate." },
      { q:"Quelle est la nature juridique de données portant sur l'orientation sexuelle ou la race d'une personne ?", o:["Des données banales d'ordre commercial","Des données sensibles (catégories particulières soumises à interdiction de principe)","Des données obligatoires pour tout contrat de travail","Des données publiques par défaut"], c:1, e:"Ces informations font partie des données hautement sensibles protégées par l'article 9 du RGPD." }
    ],
    /* S5 — Le rôle du DPO */
    [
      { q:"Que signifie l'acronyme DPO ?", o:["Data Processing Operator","Délégué à la Protection des Données (Data Protection Officer)","Digital Protection Office","Database Privacy Officer"], c:1, e:"DPO = Délégué à la Protection des Données, interlocuteur clé de la conformité." },
      { q:"Comment le DPO doit-il exercer ses missions au sein de l'organisation ?", o:["Sous la subordination et le contrôle direct de la direction commerciale","En toute indépendance, sans recevoir d'instructions sur la manière de mener ses missions","À temps partiel obligatoire avec un rôle de commercial","Sous le contrôle exclusif des actionnaires"], c:1, e:"Le DPO bénéficie d'une indépendance statutaire pour garantir son objectivité et éviter les conflits d'intérêts." },
      { q:"La désignation d'un DPO est-elle une obligation pour toutes les entreprises sans exception ?", o:["Oui, dès le premier salarié embauché","Non, elle est obligatoire pour les autorités publiques et les organismes effectuant des suivis réguliers ou à grande échelle","Jamais, c'est toujours facultatif","Uniquement pour les entreprises du CAC 40"], c:1, e:"Le DPO est obligatoire pour le secteur public et pour les structures dont l'activité de base exige un suivi régulier et systématique à grande échelle." },
      { q:"Quel est le rôle principal d'un DPO ?", o:["Concevoir les bases de données et coder les applications","Conseiller, contrôler et sensibiliser l'organisme sur le respect du RGPD","Vendre des espaces publicitaires ciblés","Gérer la comptabilité et la paie du personnel"], c:1, e:"Le DPO informe, conseille et contrôle la conformité interne, tout en faisant office de point de contact." },
      { q:"Auprès de quelle autorité externe le DPO sert-il d'interlocuteur privilégié ?", o:["Auprès de la police judiciaire","Auprès de l'autorité de contrôle (ex: la CNIL en France)","Auprès de la banque centrale européenne","Auprès des services des impôts"], c:1, e:"Il coopère avec l'autorité de protection des données (CNIL) et constitue son point de contact privilégié." },
      { q:"Qui endosse la responsabilité finale en cas de manquement au RGPD ?", o:["Le DPO en personne","Le responsable de traitement (l'entreprise ou l'organisme)","Les salariés ayant commis l'erreur","L'hébergeur informatique"], c:1, e:"Le DPO a un rôle de conseil et d'alerte, mais la responsabilité juridique incombe au responsable de traitement." },
      { q:"Un DPO peut-il être une personne externe à l'entreprise (prestatire) ?", o:["Non, il doit obligatoirement être un salarié en CDI à temps plein","Oui, le DPO peut être interne ou externe (mutualisé)","Jamais sous aucun prétexte","Uniquement s'il est avocat agréé"], c:1, e:"Le RGPD autorise explicitement le recours à un DPO externe (personne physique ou morale liée par un contrat de service)." },
      { q:"Un DPO peut-il décider lui-même des finalités et des moyens d'un traitement de données ?", o:["Oui, il a tous les pouvoirs de décision","Non, cela créerait un inacceptable conflit d'intérêts avec sa mission de contrôle","Toujours dans les start-ups","Obligatoirement si l'entreprise est petite"], c:1, e:"Le DPO ne doit pas fixer les finalités des traitements qu'il est chargé de contrôler." },
      { q:"Que doit-on faire des coordonnées du DPO au sein d'un organisme ?", o:["Les garder secrètes pour éviter le harcèlement","Les communiquer aux personnes concernées et les notifier à l'autorité de contrôle","Les inscrire uniquement sur le serveur de secours","Les détruire après chaque audit"], c:1, e:"Les coordonnées du DPO doivent être publiées et communiquées officiellement à la CNIL ainsi qu'aux usagers." },
      { q:"Quelle mission d'acculturation incombe au DPO ?", o:["Former et sensibiliser le personnel aux bonnes pratiques de protection des données","Organiser des séminaires sportifs","Enseigner la programmation Python","Gérer le recrutement technique"], c:0, e:"Le DPO joue un rôle pédagogique fondamental pour diffuser une culture de la protection des données en interne." }
    ],
    /* S6 — Pseudonymisation & anonymisation */
    [
      { q:"Comment qualifie-t-on une véritable anonymisation de données ?", o:["Réversible à tout moment grâce à une clé","Irréversible : il est impossible de ré-identifier la personne, même par recoupement","Temporaire pour une durée d'un an","Identique au chiffrement symétrique"], c:1, e:"L'anonymisation authentique est un procédé irréversible qui supprime tout lien possible avec l'individu." },
      { q:"Quelle est la caractéristique technique majeure de la pseudonymisation ?", o:["Elle est définitive et irréversible","Elle est réversible, l'information permettant de ré-identifier la personne étant conservée séparément et sécurisée","Elle supprime toutes les données personnelles","Elle chiffre le mot de passe"], c:1, e:"La pseudonymisation remplace les identifiants par un code, mais la ré-identification reste possible via une table de correspondance." },
      { q:"Une donnée pseudonymisée est-elle considérée comme une donnée personnelle par le RGPD ?", o:["Non, elle sort immédiatement du champ d'application de la loi","Oui, car la ré-identification de la personne demeure possible via la clé de correspondance","Seulement si elle est stockée sur un disque dur externe","Jamais"], c:1, e:"Puisque la personne reste indirectement identifiable (via la clé séparée), la pseudonymisation est une mesure de sécurité, pas une sortie du RGPD." },
      { q:"Une base de données véritablement et totalement anonymisée est-elle soumise au RGPD ?", o:["Oui, toujours","Non, le RGPD ne s'applique pas aux données anonymes car elles ne concernent plus de personnes identifiables","Seulement en cas de contrôle fiscal","Uniquement si elle contient des chiffres"], c:1, e:"L'anonymisation réelle rend le RGPD inapplicable, puisqu'aucune personne physique n'est identifiable." },
      { q:"Remplacer un nom par un identifiant aléatoire stocké dans une table de correspondance séparée relève de :", o:["L'anonymisation irréversible","La pseudonymisation","Du chiffrement de bout en bout","De l'effacement définitif"], c:1, e:"L'utilisation d'une table de correspondance pour masquer des identifiants est la définition classique de la pseudonymisation." },
      { q:"Quel est le risque principal associé à la pseudonymisation mal maîtrisée ?", o:["La lenteur du processeur","La ré-identification par croisement avec d'autres sources de données externes","La perte définitive du fichier source","Le coût d'achat des licences"], c:1, e:"Des données pseudonymisées peuvent souvent être ré-identifiées si un acteur malveillant croise les informations avec d'autres bases." },
      { q:"En quoi le chiffrement diffère-t-il fondamentalement de l'anonymisation ?", o:["Il n'y a aucune différence","Le chiffrement est réversible avec la bonne clé secrète, contrairement à l'anonymisation","Le chiffrement détruit les données sources","Le chiffrement est interdit par le RGPD"], c:1, e:"Le chiffrement protège la donnée en la rendant illisible, mais elle redevient accessible avec la clé : ce n'est donc pas une anonymisation." },
      { q:"Quel type de traitement de données privilégie-t-on pour publier un jeu de données en open data ?", o:["La pseudonymisation simple","L'anonymisation robuste et irréversible","Le stockage en clair","Le chiffrement par mot de passe"], c:1, e:"L'open data exige une anonymisation irréversible, car on perd tout contrôle sur les usages et les futurs recoupements." },
      { q:"Le RGPD encourage-t-il l'utilisation de la pseudonymisation ?", o:["Non, elle est strictement interdite","Oui, elle est citée comme mesure technique et organisationnelle recommandée pour réduire les risques","Elle est obligatoire pour tous les fichiers clients","Elle remplace le consentement"], c:1, e:"Le RGPD promeut la pseudonymisation comme bonne pratique de sécurité pour minimiser les impacts d'une fuite." },
      { q:"Que vise à éliminer en priorité une démarche d'anonymisation ? ", o:["Toutes les colonnes numériques","Le caractère identifiant de la donnée de manière définitive et totale","La moitié des lignes du tableau","Les erreurs de syntaxe"], c:1, e:"Anonymiser consiste à détruire tout lien direct ou indirect permettant de désigner un individu précis." }
    ],
    /* S7 — Responsabilités & sanctions */
    [
      { q:"Quel est le montant maximal des amendes administratives pouvant être prononcées par la CNIL dans les cas les plus graves ?", o:["10 000 euros fixes","4 % du chiffre d'affaires annuel mondial ou 20 millions d'euros (le montant le plus élevé étant retenu)","1 million d'euros sans condition","10 % du bénéfice net"], c:1, e:"Les violations les plus lourdes du RGPD s'exposent à des amendes pouvant atteindre 20 M€ ou 4 % du CA mondial." },
      { q:"Quelle est l'autorité administrative indépendante française chargée de veiller au respect du RGPD ?", o:["L'INSEE","La CNIL (Commission Nationale de l'Informatique et des Libertés)","La DGCCRF","L'AMF"], c:1, e:"La CNIL est le régulateur national en France pour la protection des données personnelles." },
      { q:"Dans quel délai maximal doit-on notifier une violation de données personnelles à l'autorité de contrôle (ex: CNIL) ?", o:["Dans les 72 heures après en avoir pris connaissance (si risque pour les personnes)","Dans un délai fixe d'un mois","Au moment du bilan comptable annuel","Aucune notification n'est exigée"], c:0, e:"La notification d'une faille de sécurité présentant un risque doit intervenir dans les 72 heures au plus tard." },
      { q:"Qui qualifie-t-on de « responsable de traitement » au sens du RGPD ?", o:["L'employé qui saisit les données sur son clavier","L'organisme (entreprise, collectivité) qui détermine les finalités et les moyens du traitement","Le sous-traitant technique qui héberge les serveurs","Le DPO en charge des audits"], c:1, e:"Le responsable de traitement est l'entité qui décide du « pourquoi » et du « comment » de l'utilisation des données." },
      { q:"Qu'est-ce qu'un « sous-traitant » (processor) ?", o:["L'autorité de régulation indépendante","Une entité qui traite des données personnelles pour le compte et sur instruction du responsable de traitement","La personne concernée par le fichier","Un concurrent commercial"], c:1, e:"Le sous-traitant exécute des prestations techniques (ex: hébergeur cloud, outil SaaS) pour le compte du responsable." },
      { q:"Quel document obligatoire recense l'ensemble des traitements de données réalisés par un organisme ?", o: ["Le bilan financier annuel","Le registre des activités de traitement","Le manuel d'utilisation des logiciels","Le plan de communication"], c:1, e:"Le registre des traitements est la carte d'identité de la conformité : il liste tous les fichiers et leurs caractéristiques." },
      { q:"À quel moment précis doit-on réaliser une analyse d'impact (AIPD ou DPIA) ?", o:["Pour chaque envoi d'email promotionnel","Lorsque le traitement est susceptible d'engendrer un risque élevé pour les droits et libertés des personnes","Une fois par siècle obligatoirement","Uniquement en cas de faillite"], c:1, e:"L'AIPD (Analyse d'Impact sur la Protection des Données) est requise pour les traitements à haut risque (ex: IA, biométrie, surveillance)." },
      { q:"Que signifie le concept de « privacy by design » (protection dès la conception) ?", o:["Sécuriser les données uniquement après une cyberattaque","Intégrer la protection des données dès l'origine de la conception d'un projet ou d'un outil","Rendre le design des interfaces plus coloré","Chiffrer le code source en fin de contrat"], c:1, e:"Le privacy by design impose de penser la sécurité et la conformité dès les premières lignes de spécification d'un projet." },
      { q:"Quelle mesure corrective la CNIL peut-elle prononcer avant d'infliger une amende financière ?", o:["Une faillite d'entreprise immédiate","Une mise en demeure de se mettre en conformité sous un certain délai","L'expulsion des dirigeants","Aucune, l'amende est automatique"], c:1, e:"La mise en demeure permet à l'organisme de rectifier le tir avant que des sanctions pécuniaires ne soient prononcées." },
      { q:"Les sanctions prévues par le RGPD se limitent-elles exclusivement à des amendes financières ?", o:["Oui, uniquement des amendes pécuniaires","Non, l'autorité peut prononcer des avertissements, des mises en demeure, des injonctions ou des interdictions de traitement","Elles se limitent à un blâme oral","Elles entraînent la prison systématique des salariés"], c:1, e:"La panoplie répressive inclut des mesures correctrices variées (rapports à l'ordre, suspensions, interdictions temporaires ou définitives)." }
    ],
    /* S8 — RGPD au quotidien du data analyst */
    [
      { q:"De quoi le data analyst doit-il impérativement s'assurer avant de collecter ou d'analyser un nouveau dataset ?", o:["Que le design graphique des dashboards est validé","Qu'une base légale et une finalité précise justifient ce traitement","Que les fichiers sont au format CSV","Que le volume dépasse un million de lignes"], c:1, e:"Toute manipulation de données personnelles doit s'adosser à une finalité légitime et une base légale établie." },
      { q:"Quelle est la bonne pratique RGPD incontournable avant de partager un jeu de données à des tiers en externe ?", o:["Envoyer l'intégralité des noms et emails en clair pour plus de précision","Anonymiser ou pseudonymiser rigoureusement le jeu de données au préalable","Ajouter un mot de passe simple par email","Ne rien modifier"], c:1, e:"On retire ou masque les informations identifiantes avant toute diffusion de données en dehors du cercle habilité." },
      { q:"Comment s'applique le principe de minimisation lorsqu'un data analyst conçoit un jeu de données ?", o:["En conservant toutes les colonnes possibles « au cas où »","En ne sélectionnant et ne conservant que les variables strictement nécessaires à l'analyse visée","En dupliquant les tables pour plus de sécurité","En supprimant toutes les lignes paires"], c:1, e:"Conserver des colonnes par simple habitude contrevient à la minimisation : on ne garde que ce qui sert l'analyse." },
      { q:"Conserver un jeu de données personnelles « pour une durée indéfinie » au cas où une future analyse en aurait besoin est :", o:["Recommandé par les bonnes pratiques data","Contraire au principe de limitation de la conservation","Obligatoire pour les data scientists","Sans aucun risque juridique"], c:1, e:"Garder des données sans limite de temps viole le principe de conservation proportionnée à la finalité." },
      { q:"Quel niveau de vigilance s'impose lorsqu'on manipule des données de santé dans le cadre d'une analyse ?", o:["Aucune vigilance particulière, ce sont des données comme les autres","Une vigilance maximale, car il s'agit de données sensibles (catégories particulières) soumises à un régime ultra-strict","Il est obligatoire de les publier sur un blog","Elles doivent être imprimées sur papier"], c:1, e:"Les données de santé exigent des garanties de sécurité et des conditions de traitement renforcées (chiffreurs, habilitations)." },
      { q:"Quel mécanisme de sécurité met-on en place pour limiter l'accès aux données sensibles d'une base ?", o:["Un accès partagé et libre pour tous les employés de l'entreprise","Des contrôles d'accès stricts basés sur le besoin d'en connaître (need-to-know)","La suppression de tout mot de passe","L'affichage des données sur les écrans de la cafétéria"], c:1, e:"L'accès aux données personnelles doit être restreint aux seuls collaborateurs habilités qui en ont strictement besoin pour leur mission." },
      { q:"Que démontre le fait de documenter rigoureusement ses sources, ses finalités et ses durées de conservation ?", o:["Le respect du principe d'accountability (capacité à prouver sa conformité)","Une perte de temps informatique","Une infraction au secret des affaires","Le niveau de compétences en Python"], c:0, e:"Tenir à jour une documentation technique et juridique illustre concrètement l'exigence d'accountability." },
      { q:"Le suivi des utilisateurs via des traceurs ou des cookies d'analyse d'audience (analytics) nécessite :", o: ["Rien du tout, c'est totalement invisible","Une information préalable et, dans la majorité des cas, le recueil du consentement de l'internaute","Le blocage immédiat du site web","Le paiement d'une redevance"], c:1, e:"La plupart des cookies non essentiels (mesure d'audience, traçage publicitaire) requièrent information et consentement exprès." },
      { q:"Qu'induit le fait de télécharger une base de données clients sur son ordinateur personnel non sécurisé pour télétravailler ?", o: ["Une excellente initiative d'efficacité","Un manquement potentiel aux règles de sécurité et un risque élevé de fuite de données","Une obligation légale","Une accélération du traitement"], c:1, e:"Sortir des données hors du périmètre maîtrisé et sécurisé de l'entreprise augmente considérablement le risque de compromission." },
      { q:"En cas de doute sur la légitimité ou la conformité d'un traitement de données, vers quel référent interne le data analyst doit-il se tourner ?", o:["Vers l'équipe de maintenance du matériel","Vers le DPO (Délégué à la Protection des Données) de son organisation","Vers le service marketing","Vers un forum public sur internet"], c:1, e:"Le DPO est l'expert interne désigné pour accompagner, conseiller et trancher sur les questions de conformité RGPD." }
    ]

  scraping: [
    /* S1 — Principes & cas d'usage */
    [
      { q:"Qu'est-ce que le web scraping ? ", o:["Une méthode pour concevoir des sites web dynamiques","L'extraction automatisée de données affichées sur des pages web","Un protocole de sécurisation des serveurs distants","Un procédé de chiffrement des flux HTTP"], c:1, e:"Le web scraping consiste à automatiser la récupération des informations contenues dans le code HTML de pages web." },
      { q:"Quel est un cas d'usage typique et courant du web scraping en entreprise ?", o:["L'envoi automatisé de campagnes d'e-mailing non sollicitées","La veille concurrentielle et le suivi automatisé des prix en ligne","Le développement d'interfaces de design graphique","L'impression papier de catalogues de produits"], c:1, e:"Le suivi des tarifs et des catalogues des concurrents est l'application la plus fréquente du scraping." },
      { q:"Si une API officielle, documentée et stable est proposée par un site web, que doit-on faire ?", o:["Toujours privilégier le scraping direct pour s'entraîner","Préférer l'utilisation de l'API, car elle est plus propre, stable et structurée","Le scraping devient alors strictement obligatoire","Ignorer l'API car elle est payante"], c:1, e:"Une API fournit des données structurées et garantit une bien meilleure stabilité qu'un script de scraping." },
      { q:"Sous quel format final cherche-t-on idéalement à structurer les données issues d'un scraping ?", o:["Un bloc de texte brut désordonné et non formaté","Des données structurées exploitables (ex: tableaux, fichiers CSV, DataFrames)","Un fichier binaire compressé illisible","Des images fixes au format PNG"], c:1, e:"L'objectif final est de transformer du HTML brut en structures tabulaires prêtes pour l'analyse de données." },
      { q:"Quelle est la distinction fondamentale entre le crawling et le scraping ?", o:["Aucune distinction, ce sont deux termes synonymes","Le crawling explore et découvre des pages en suivant les liens, tandis que le scraping en extrait le contenu précis","Le scraping héberge le site web, le crawling le supprime","Le crawling chiffre les données textuelles"], c:1, e:"Un crawler navigue de page en page (exploration), tandis qu'un scraper cible et extrait des données spécifiques." },
      { q:"Sur quelle source primaire de la page web le scraping s'appuie-t-il techniquement ?", o:["Sur la base de données interne du serveur cible","Sur le code source HTML structuré renvoyé par le serveur","Sur le cache du navigateur de l'utilisateur","Sur le protocole DNS du domaine"], c:1, e:"Le script de scraping télécharge le code HTML brut de la page pour y repérer les balises contenant l'information." },
      { q:"Quel risque technique majeur fait-on courir à un site cible en cas de scraping mal conçu et massif ?", o:["Une augmentation de son référencement SEO","Une surcharge anormale de son serveur risquant de perturber son service","Un chiffrement accidentel de sa base de données","Une amélioration de sa bande passante"], c:1, e:"Des requêtes trop rapprochées ou massives s'apparentent à une attaque par déni de service et saturent le serveur." },
      { q:"Le web scraping est-il une pratique systématiquement et universellement légale ?", o:["Oui, tout ce qui s'affiche sur un écran est public et libre de droits","Non, la légalité dépend des conditions d'utilisation (CGU), du robots.txt et de la nature des données","Toujours interdite par le droit international","Strictement interdite de jour, tolérée la nuit"], c:1, e:"La licéité du scraping dépend du respect des CGU du site, du robots.txt et de la protection éventuelle des données." },
      { q:"Quelle est l'étape logique impérative qui suit immédiatement l'extraction de données par scraping ?", o:["La destruction immédiate des fichiers récoltés","Le nettoyage, la structuration et la validation des données avant analyse ou stockage","Le renvoi automatique des données au serveur d'origine","Le chiffrement par mot de passe du dossier"], c:1, e:"Les données scrapées sont souvent bruitées : elles nécessitent un nettoyage rigoureux avant d'être exploitées." },
      { q:"Quel incident technique survient fréquemment lorsqu'un site cible modifie son architecture ?", o:["Rien du tout, les scripts s'adaptent d'eux-mêmes","Le script de scraping risque d'être rompu (cassage des sélecteurs HTML)","La vitesse d'exécution est multipliée par dix","Le langage Python se désinstalle"], c:1, e:"Le scraping repose sur des repères HTML précis : toute modification de structure peut invalider les sélecteurs." }
    ],
    /* S2 — HTML, DOM & sélecteurs */
    [
      { q:"Que représente le modèle DOM (Document Object Model) d'une page web ?", o:["Un fichier image compressé","La structure arborescente et hiérarchique des éléments HTML de la page","Le protocole de transport réseau du serveur","Une table relationnelle SQL"], c:1, e:"Le DOM modélise la page sous forme d'un arbre d'objets (les balises) facilitant la navigation et la sélection." },
      { q:"Dans l'élément HTML <p class=\"intro text-bold\">, quelle est la valeur précise de l'attribut class ?", o:["p","intro text-bold","</p>","le texte brut contenu dedans"], c:1, e:"L'attribut class contient la chaîne de classes CSS appliquées à l'élément, ici 'intro text-bold'." },
      { q:"Quel sélecteur CSS permet de cibler spécifiquement les éléments possédant la classe 'prix' ?", o:["#prix","@prix","§prix",".prix"], c:3, e:"En syntaxe CSS, un point (.) désigne une classe (ex: .prix cible tous les éléments dotés de class='prix')." },
      { q:"Quel sélecteur CSS cible l'élément unique caractérisé par un identifiant id='menu' ?", o:[".menu","#menu","*menu","menu"], c:1, e:"Le symbole dièse (#) cible un attribut id unique (ex: #menu cible id='menu')." },
      { q:"Quelle règle fondamentale doit respecter un attribut id au sein d'une page HTML valide ?", o:["Être répété sur toutes les balises de la page","Être strictement unique dans l'ensemble du document","Être obligatoirement composé de chiffres","Être vide par défaut"], c:1, e:"Un id identifie une ressource unique : il ne doit pas y avoir de doublon d'id dans un même document HTML." },
      { q:"Quelle balise HTML standard est utilisée pour structurer un lien hypertexte ?", o:["<link>","<p>","<a>","<div>"], c:2, e:"La balise <a> (anchor) crée un lien hypertexte, dont la destination est portée par l'attribut href." },
      { q:"Dans l'arbre DOM, comment qualifie-t-on un élément HTML directement englobé par un autre ?", o:["Un élément parent","Un élément enfant (child)","Un élément frère (sibling)","Un ancêtre lointain"], c:1, e:"L'élément imbriqué à l'intérieur d'un autre est son enfant, tandis que celui qui l'enveloppe est son parent." },
      { q:"Comment s'écrit le sélecteur CSS universel pour cibler toutes les balises <h2> de la page ?", o:["#h2",".h2","h2","@h2"], c:2, e:"Indiquer le nom de la balise seul (h2) sélectionne l'ensemble des éléments de ce type présents dans le DOM." },
      { q:"Où se trouve stockée l'URL de destination d'un lien au sein d'une balise <a> ?", o:["Dans le texte affiché par la balise","Dans l'attribut href","Dans l'attribut class","Dans l'attribut id"], c:1, e:"L'attribut href (hypertext reference) contient l'adresse web vers laquelle pointe le lien." },
      { q:"Quelle est la structure syntaxique standard d'une balise HTML conventionnelle ?", o:["[balise]...[/balise]","<balise>...</balise>","{balise}...{/balise}","(balise)...(/balise)"], c:1, e:"Une balise HTML s'ouvre avec des chevrons (<balise>) et se ferme généralement avec un slash (/balise)." }
    ],
    /* S3 — requests : récupérer la page */
    [
      { q:"Quelle fonction de la bibliothèque requests permet d'envoyer une requête HTTP GET pour télécharger une page ?", o:["requests.fetch()","requests.load()","requests.open()","requests.get()"], c:3, e:"requests.get(url) est la fonction standard pour émettre une requête GET et récupérer une ressource web." },
      { q:"Quel attribut de l'objet Response de requests contient le code HTML décodé de la page ?", o:["response.html","response.body","response.text","response.page"], c:2, e:"response.text restitue le contenu textuel brut du corps de la réponse, décodé selon l'encodage détecté." },
      { q:"Que contient l'attribut response.status_code après l'exécution d'une requête ?", o:["Le code de statut HTTP de la réponse (ex: 200, 404)","Le code source HTML complet de la page","L'URL finale après redirection","Le nombre total d'octets téléchargés"], c:0, e:"Le status_code renvoie le code numérique normalisé du protocole HTTP indiquant le résultat de l'opération." },
      { q:"Que signifie un code de statut HTTP égal à 200 ?", o:["Une erreur interne du serveur distant","Une ressource introuvable","Un succès de la requête (OK)","Une redirection permanente"], c:2, e:"Le code 200 (OK) confirme que la requête a été reçue, comprise et traitée avec succès par le serveur." },
      { q:"Pour quelle raison est-il souvent indispensable de définir un en-tête User-Agent dans requests ?", o:["Pour chiffrer les données en transit","Pour s'identifier et simuler un vrai navigateur web, évitant ainsi certains blocages automatiques","Pour accélérer le débit de téléchargement","Pour supprimer la nécessité d'un parseur HTML"], c:1, e:"Beaucoup de sites bloquent les requêtes dont le User-Agent indique un script automatisé (comme Python/requests)." },
      { q:"Que retourne l'attribut response.content d'un objet Response ?", o:["Le texte décodé en chaîne de caractères","Le contenu binaire brut sous forme d'octets (bytes)","Le code de statut HTTP","La liste des cookies"], c:1, e:"response.content fournit les octets bruts (bytes), indispensable pour récupérer des fichiers binaires (images, PDF)." },
      { q:"À quoi sert l'argument timeout passé à une fonction requests.get ?", o:["À accélérer artificiellement la réponse du serveur","À interrompre la requête et lever une exception si le serveur met trop de temps à répondre","À programmer un déclenchement différé du script","À vider le cache du navigateur"], c:1, e:"timeout évite qu'un script ne reste bloqué indéfiniment si le serveur distant est en panne ou trop lent." },
      { q:"Quelle méthode de l'objet Response privilégie-t-on lorsqu'une API retourne du JSON ?", o:["response.text brute","response.json()","response.html()","response.dict()"], c:1, e:"response.json() analyse directement le corps de la réponse au format JSON et le convertit en dictionnaire/liste Python." },
      { q:"Quelle vérification préliminaire est-il prudent d'effectuer avant de parser le contenu d'une réponse ?", o:["Vérifier que response.status_code vaut 200","Compter le nombre de lignes du script","Vérifier la couleur du terminal","Vérifier la version de Windows"], c:0, e:"S'assurer du code 200 évite de tenter de parser une page d'erreur (404, 500) qui ne contiendra pas les données attendues." },
      { q:"Quel type d'objet est retourné par l'appel de la fonction requests.get(url) ?", o:["Une chaîne de caractères (str)","Un dictionnaire associatif","Un objet Response","Une liste de balises"], c:2, e:"requests.get() retourne un objet Response encapsulant l'intégralité des métadonnées et du contenu de la réponse." }
    ],

    [
      { q:"Comment initialise-t-on correctement un objet BeautifulSoup à partir d'un code HTML ?", o:["BeautifulSoup(html, 'html.parser')","BS.parse(html)","html.soup()","soup.create(html)"], c:0, e:"On instancie BeautifulSoup en lui passant la chaîne HTML et le nom du parseur (ex: 'html.parser')." },

      { q:"Que retourne l'appel de méthode soup.find_all('a') ?", o:["Le premier lien hypertexte trouvé","Une liste (itérable) contenant l'ensemble des balises correspondantes","Un dictionnaire de tous les liens","Un entier représentant le nombre de liens"], c:1, e:"find_all() parcourt tout le document et retourne une liste de toutes les balises correspondant au critère." },
      { q:"Que retourne la méthode find() si la balise recherchée est absente du code HTML ?", o: ["Une erreur de type NotFoundError","La valeur None","Une liste vide []","La chaîne vide ''"], c:1, e:"Si aucun élément ne correspond, find() retourne silencieusement None (penser à tester avant d'appeler .text)." },
      { q:"Quelle syntaxe utilise-t-on avec BeautifulSoup pour cibler des éléments possédant une classe 'item' ?", o:["find_all(class='item')","find_all(class_='item')","find_all('.item')","find_all(item)"], c:1, e:"Puisque class est un mot-clé réservé en Python, BeautifulSoup utilise l'argument de contournement class_='item'." },
      { q:"Quelle est la distinction fondamentale entre find() et find_all() ?", o:["Aucune distinction, ce sont des synonymes","find() retourne le premier élément trouvé, tandis que find_all() retourne une liste de tous les éléments correspondants","find() est réservé au texte, find_all() aux attributs","find_all() est plus rapide mais moins précis"], c:1, e:"find() isole l'occurrence unique initiale, là où find_all() collecte l'intégralité des correspondances sous forme de liste." },
      { q:"Que désigne l'argument 'html.parser' passé lors de la création de l'objet BeautifulSoup ?", o:["Une balise HTML obligatoire","L'analyseur (parser) natif de Python utilisé pour interpréter la structure du document","Un fichier CSS externe","Une URL de secours"], c:1, e:"'html.parser' est le parseur intégré par défaut à la bibliothèque standard pour décoder le code HTML." },
      { q:"Comment cibler précisément une balise <div> dotée d'un identifiant id='prix' ?", o:["find('div', id='prix')","find('#prix div')","find_all(div.prix)","find('div')['prix']"], c:0, e:"find() accepte les attributs en paramètres nommés, permettant de filtrer finement (ex: find('div', id='prix'))." },
      { q:"Que retourne l'attribut soup.title lorsqu'il est appelé sur un objet BeautifulSoup ?", o:["Le corps entier de la page","La balise <title> complète du document (avec ses balises)","Le texte brut de la page","Une erreur de syntaxe"], c:1, e:"soup.title retourne l'objet Tag correspondant à la balise <title>, dont on extrait le contenu textuel via .text." },
      { q:"Quel type d'instruction utilise-t-on classiquement pour parcourir les résultats d'un find_all ?", o:["Une boucle for pour itérer sur la liste des balises retournées","Une condition if unique","Une boucle while infinie","Une instruction SQL SELECT"], c:0, e:"Puisque find_all() retourne une liste, on la parcourt itérativement à l'aide d'une boucle for pour traiter chaque élément." }

    [
      { q:"Comment extrait-on le contenu textuel visible d'une balise Tag avec BeautifulSoup ?", o: ["tag.value","tag.text (ou tag.get_text())","tag.html","tag.content"], c:1, e:"L'attribut .text (ou la méthode .get_text()) restitue l'ensemble du texte brut contenu à l'intérieur de la balise." },
      { q:"Comment récupère-t-on l'URL cible stockée dans l'attribut href d'une balise <a> nommée a ?", o:["a.text","a.url","a['href']","a.link"], c:2, e:"Les objets Tag de BeautifulSoup se comportent comme des dictionnaires pour accéder aux attributs (ex: a['href'])." },
      { q:"Quelle méthode d'accès aux attributs d'un Tag est sécurisée contre les erreurs si l'attribut est absent ?", o:["tag['attribut']","tag.get('attribut')","tag.attr('attribut')","tag.find('attribut')"], c:1, e:"La méthode .get('attribut') retourne None si l'attribut n'existe pas, évitant le déclenchement d'une KeyError." },
      { q:"Quel est le résultat de l'enchaînement de méthodes tag.text.strip() ?", o:["Il supprime la balise HTML de la mémoire","Il récupère le texte brut tout en nettoyant les espaces superflus aux extrémités","Il met le texte en majuscules","Il compte le nombre de mots"], c:1, e:"Combiner .text et .strip() permet d'obtenir une chaîne de texte propre, débarrassée des retours chariots et espaces." },
      { q:"Que retourne l'attribut tag.attrs d'une balise BeautifulSoup ?", o:["Le texte brut de la balise","Un dictionnaire regroupant l'ensemble des attributs et de leurs valeurs","La liste des enfants directs","L'URL de la page source"], c:1, e:"attrs expose tous les attributs de la balise sous la forme d'un dictionnaire Python clé-valeur." },
      { q:"Comment procéder pour extraire du texte situé au cœur d'éléments HTML profondément imbriqués ?", o:["En enchaînant les méthodes find successives avant d'appeler .text","En utilisant une requête SQL","En supprimant le DOM","En exécutant un script JavaScript externe"], c:0, e:"On navigue dans l'arborescence en enchaînant les recherches (ex: soup.find('div').find('span').text)." },
      { q:"Sous quel type de structure de données BeautifulSoup retourne-t-il l'attribut class d'une balise ?", o:["Une chaîne de caractères unique","Une liste de chaînes (list), car une classe peut comporter plusieurs valeurs","Un entier numérique","Un dictionnaire"], c:1, e:"Puisque HTML autorise plusieurs classes sur un même élément, BeautifulSoup retourne l'attribut class sous forme de liste." },
      { q:"Comment extrait-on le texte de tous les éléments d'une liste <li> extraits par find_all ?", o:["En appliquant .text directement sur la liste entière","En parcourant la liste de tags dans une boucle for et en lisant .text pour chacun","En utilisant un filtre SQL","En exportant en CSV"], c:1, e:"Il faut itérer sur la liste des tags retournés par find_all et appliquer .text à chaque élément individuel." },
      { q:"Que fait la méthode get_text() par rapport au simple attribut .text ?", o: ["Elle supprime les balises","Elle retourne le texte de l'élément ainsi que celui de tous ses descendants imbriqués","Elle ne fonctionne qu'avec les liens","Elle convertit en minuscules"], c:1, e:"get_text() parcourt récursivement tous les sous-éléments pour concaténer l'intégralité du texte contenu." },
      { q:"Comment accède-t-on à l'URL de la source d'une image <img> ?", o:["img.text","img['src']","img.image","img.url"], c:1, e:"L'adresse de la source d'une image est stockée dans l'attribut src, accessible via img['src'] ou img.get('src')." }
    ],
    /* S6 — Pagination multi-pages */
    [
      { q:"Quelle structure de code met-on en place pour parcourir et scraper plusieurs pages web successives ?", o:["Une seule requête unique","Une boucle itérant sur les numéros de page ou les URLs dynamiques","Une instruction SQL de jointure","Un script de chiffrement"], c:1, e:"On utilise une boucle pour générer et visiter successivement l'URL de chaque page du site." },
      { q:"Sous quelle forme se présente le plus souvent l'URL d'une page web paginée ?", o:["Un fichier binaire fixe","Un paramètre de requête type site.com?page=2 ou un chemin modifié","Une adresse IP masquée","Un script en lecture seule"], c:1, e:"La pagination utilise généralement un paramètre GET (ex: ?page=2) ou un numéro intégré au chemin de l'URL." },
      { q:"Quelle technique Python permet de construire dynamiquement l'URL de la page n au sein d'une boucle ?", o:["La concaténation par addition simple","Une f-string (ex: f'https://site.com/catalogue?page={n}')","L'utilisation du module os","Une instruction SQL"], c:1, e:"Les f-strings permettent d'insérer proprement la variable numérique de la boucle dans la structure de l'URL." },
      { q:"Comment procède-t-on pour accumuler les données extraites au fil des pages visitées ?", o:["On écrase les résultats à chaque page dans la même variable","On les ajoute (append ou extend) au sein d'une liste globale commune","On les renvoie immédiatement au serveur cible","On les supprime de la mémoire vive"], c:1, e:"On stocke les données extraites de chaque page dans une liste globale qui s'enrichit itération après itération." },
      { q:"Pour quelle raison est-il impératif d'insérer un délai (ex: time.sleep) entre deux pages scrapées ?", o:["Pour laisser le temps au processeur de refroidir","Pour ne pas surcharger le serveur distant et éviter d'être bloqué (banni)","Pour chiffrer les données collectées","Pour valider la syntaxe HTML"], c:1, e:"Marquer des pauses (rate limiting) évite d'émettre des requêtes à un rythme suspect qui déclencherait une protection anti-bot." },
      { q:"Comment un script peut-il détecter qu'il a atteint la toute dernière page d'une pagination ?", o:["En comptant jusqu'à l'infini","En détectant l'absence de résultats, la disparition du bouton « suivant » ou une erreur 404","En fermant le navigateur","Au hasard"], c:1, e:"On conditionne l'arrêt de la boucle à l'absence de contenu sur la page ou à la disparition du lien vers la page suivante." },
      { q:"Que génère l'instruction de boucle for page in range(1, 6) ?", o:["Une seule page visitée","La séquence des pages 1, 2, 3, 4 et 5 (la borne 6 étant exclue)","Six pages au total","Zéro page"], c:1, e:"range(1, 6) produit les entiers de 1 à 5. La borne supérieure est toujours exclue en Python." },
      { q:"Que doit-on extraire du code HTML pour suivre automatiquement le bouton « suivant » d'une pagination ?", o:["Le style CSS du bouton","L'attribut href pointant vers la page suivante","Le nom de l'auteur de la page","Le code de statut HTTP"], c:1, e:"On récupère le lien (href) de la balise du bouton « suivant » pour s'en servir d'URL pour l'itération suivante." },
      { q:"Quels risques encourt-on en scrapant de la pagination sans condition d'arrêt explicite ?", o:["De terminer le script plus rapidement","De tomber dans une boucle infinie générant un trafic inutile et une saturation du script","D'améliorer la qualité des données","De chiffrer la base de données"], c:1, e:"Sans garde-fou ni condition de sortie, le script risque de tourner indéfiniment ou de boucler en rond sur des pages." },
      { q:"Quel est l'intérêt de consolider l'ensemble des données paginées dans un DataFrame Pandas final ?", o:["De perdre les informations superflues","De faciliter grandement le nettoyage, la manipulation et l'analyse globale des données","De rendre le fichier illisible","D'accélérer le scraping"], c:1, e:"Rassembler toutes les pages dans un DataFrame unique permet d'appliquer des traitements tabulaires globaux." }
    ],
    /* S7 — Légalité & robots.txt */
    [
      { q:"Quel est l'objectif principal du fichier robots.txt situé à la racine d'un site web ?", o:["De styliser graphiquement les pages web","D'indiquer aux robots d'indexation et scrapers les zones autorisées ou interdites au crawl","De chiffrer les données personnelles des utilisateurs","D'héberger la base de données principale"], c:1, e:"Le fichier robots.txt énonce les règles d'accès que les robots automatisés sont invités à respecter." },
      { q:"À quel emplacement standard d'un domaine web trouve-t-on le fichier robots.txt ?", o:[ "À la racine du site (ex: mondomaine.com/robots.txt)","Dans un dossier caché du bureau","À l'intérieur de la balise <head> du HTML","Il n'y a pas d'emplacement fixe"], c:0, e:"Le fichier robots.txt doit obligatoirement se situer à la racine absolue du domaine pour être lu par les robots." },
      { q:"Que signifie la directive « Disallow: /admin » lue dans un fichier robots.txt ?", o:["Qu'il est fortement conseillé de visiter le dossier admin","Que le propriétaire du site demande aux robots de ne pas explorer le dossier /admin","Que le dossier admin est en accès libre et gratuit","Que le dossier admin a été supprimé"], c:1, e:"Disallow (interdire) signale aux robots d'exploration de ne pas aspirer les chemins indiqués." },
      { q:"Quel cadre légal s'applique obligatoirement dès lors qu'un scraping collecte des données personnelles ?", o:["Aucune règle, les données publiques échappent à toute loi","Le respect impératif du RGPD","Le droit de la propriété intellectuelle exclusivement","Le code de la route"], c:1, e:"Dès que l'on touche à des données identifiant des personnes physiques, le RGPD s'applique sans exception." },
      { q:"Quel impact les Conditions Générales d'Utilisation (CGU) d'un site web peuvent-elles avoir sur le scraping ?", o:["Elles n'ont aucune valeur juridique","Elles peuvent interdire formellement l'extraction automatisée de données","Elles obligent le site à fournir une API gratuite","Elles suppriment le fichier robots.txt"], c:1, e:"Beaucoup de sites interdisent le scraping dans leurs CGU : les enfreindre expose à des risques de contentieux." },
      { q:"Par quel type de droit les contenus textuels et créatifs d'un site web sont-ils protégés ?", o: ["Par le droit d'auteur","Par le protocole HTTP","Par la loi sur les cookies","Par le langage CSS"], c:0, e:"Textes, images et bases de données originales sont protégés par le droit d'auteur et le droit sui generis des bases de données." },
      { q:"Le fichier robots.txt constitue-t-il un blocage technique infranchissable pour un script de scraping ?", o:["Oui, il bloque l'accès physique aux pages par un chiffrement fort","Non, c'est une convention déontologique et une consigne que le scraper choisit (ou non) de respecter","Oui, le serveur bloque l'adresse IP automatiquement","Il supprime le code HTML des pages interdites"], c:1, e:"Le robots.txt n'empêche pas techniquement le téléchargement : c'est une règle de courtoisie et d'éthique." },
      { q:"Quelle attitude de « bonne conduite » adopte-t-on envers un serveur lors d'un scraping responsable ?", o:["On sature la bande passante pour finir le plus vite possible","On espace les requêtes et on limite la fréquence d'appel","On cache son adresse IP pour être discret","On ignore les erreurs serveur"], c:1, e:"Modérer la fréquence des requêtes évite de pénaliser les performances du site cible." },
      { q:"Le fait qu'une information soit affichée publiquement sur une page web signifie-t-il qu'elle est librement réutilisable ?", o: ["Oui, tout ce qui est public appartient à tout le monde","Non, l'accessibilité visuelle ne vaut pas renoncement aux droits ni liberté de réutilisation","Oui, sans aucune restriction légale","Seulement la nuit"], c:1, e:"Qu'une donnée soit visible ne signifie pas qu'on a le droit de la copier, de la stocker et de la revendre." },
      { q:"Quelle est la bonne attitude à adopter en cas de doute juridique sur le scraping d'un site tiers ?", o:["Foncer sans se poser de questions","Vérifier les CGU, le robots.txt et privilégier l'usage d'une API ou une demande d'autorisation","Modifier l'URL pour contourner les protections","Copier la base entière en secret"], c:1, e:"Analyser les règles en amont et rechercher une alternative officielle (API) garantit la sécurité juridique du projet." }
    ],
    /* S8 — Bonnes pratiques & éthique */
    [
      { q:"Quelle bonne pratique technique met-on en œuvre pour réduire drastiquement le risque de blocage IP ?", o:["Envoyer un million de requêtes par seconde","Espacer les requêtes à l'aide de pauses temporelles (ex: time.sleep)","Supprimer la gestion des erreurs","Utiliser un terminal en mode administrateur"], c:1, e:"Ralentir le rythme imite une navigation humaine et évite de déclencher les alertes anti-bot." },
      { q:"Pourquoi est-il crucial d'implémenter une gestion robuste des erreurs (try/except, statuts) ?", o:["Pour ralentir le script","Pour s'assurer que le script ne plante pas lamentablement à la première page manquante ou indisponible","Pour chiffrer les données","Pour modifier le code HTML en direct"], c:1, e:"Une bonne gestion des exceptions garantit la résilience du scraper sur de gros volumes de pages." },
      { q:"Quel est l'avantage majeur de mettre en cache les pages déjà téléchargées sur le disque ?", o:["D'alourdir le stockage inutilement","D'éviter de re-solliciter inutilement le serveur distant lors des phases de test et de mise au point","De supprimer le besoin de parseurs","De chiffrer le cache"], c:1, e:"Le cache évite de refaire des requêtes réseau redondantes, économisant la bande passante et le temps." },
      { q:"Avant de lancer un grand scraping massif sur des milliers de pages, que doit-on faire par prudence ?", o: ["Lancer le script complet directement sans test","Tester d'abord le script à petite échelle sur deux ou trois pages pour valider les sélecteurs","Effacer le fichier robots.txt","Changer de langage de programmation"], c:1, e:"Valider la logique sur un échantillon réduit évite de lancer une collecte erronée de longue durée." },
      { q:"Quel est l'intérêt éthique d'inclure des informations de contact et un User-Agent explicite ?", o:["De pirater le site cible","D'agir avec transparence en permettant au propriétaire du site d'identifier le scraper et de joindre le développeur","D'accélérer l'exécution du script","De masquer son identité"], c:1, e:"S'identifier honnêtement témoigne d'une démarche transparente et responsable." },
      { q:"Si une API officielle est disponible, que recommande l'éthique du développeur ?", o:["De scraper en force pour contourner l'API","D'utiliser en priorité l'API officielle, conçue précisément pour cet échange de données","D'ignorer l'API car elle est trop simple","De bloquer l'API"], c:1, e:"L'API est la voie royale : elle respecte les choix de l'éditeur et garantit la pérennité de l'accès." },
      { q:"Pourquoi est-il déconseillé d'effectuer des scrapings lourds pendant les heures de forte affluence d'un site ?", o:["Parce que le code Python s'exécute moins vite","Parce qu'on risque de surcharger le serveur au moment où il a le plus de vrais utilisateurs à servir","Parce que le HTML change de couleur","Parce que le Wi-Fi est plus lent"], c:1, e:"Respecter les pics d'affluence évite de dégrader la qualité de service pour les utilisateurs légitimes du site." },
      { q:"Comment l'éthique s'applique-t-elle face à des données à caractère personnel collectées par scraping ?", o:["On peut les revendre librement","On doit impérativement respecter les principes du RGPD (minimisation, finalité, sécurité)","On les publie en open data","On les supprime sans les analyser"], c:1, e:"Le scraping ne dispense en rien du respect des lois sur la protection des données personnelles." },
      { q:"Quels sont les trois piliers indissociables d'un script de scraping de qualité professionnelle ?", o:["Vitesse, complexité et opacité","Délais de courtoisie, robustesse (gestion d'erreurs) et transparence (User-Agent)","SQL, HTML et CSS","Absence de test, absence de cache et blocage IP"], c:1, e:"Un bon scraper est mesuré (pauses), résistant aux pannes (try/except) et transparent (identification)." },
      { q:"Quelle mentalité globale doit guider un projet de web scraping ?", o:["Prendre le maximum de données, le plus vite possible, sans se soucier des règles","Agir avec mesure, transparence, respect des règles techniques et considération pour le site hôte","Ignorer systématiquement les avertissements du web","Cacher son identité à tout prix"], c:1, e:"Modération et respect de l'écosystème web garantissent des pratiques durables et sans conflit." }
    ]

   api: [
    /* S1 — Concepts REST */
    [
      { q:"Que signifie exactement l'acronyme REST appliqué aux services web ?", o:["Remote Server Transfer","Representational State Transfer","Reactive State Transaction","Rapid Exchange Standard"], c:1, e:"REST (Representational State Transfer) est un style d'architecture logicielle pour les services web distribués." },
      { q:"Pourquoi dit-on qu'une API REST est intrinsèquement « sans état » (stateless) ?", o:["Parce qu'elle ne fonctionne qu'en local sans connexion réseau","Parce que chaque requête du client doit contenir toute l'information nécessaire ; le serveur ne mémorise pas la session","Parce qu'elle supprime automatiquement toutes les données après chaque appel","Parce qu'elle n'utilise aucun protocole de transport"], c:1, e:"L'architecture stateless impose que le serveur traite chaque requête de manière isolée, sans conserver d'historique de session." },
      { q:"Qu'est-ce qu'une « ressource » dans le modèle d'architecture REST ?", o:["Un fichier binaire stocké sur le bureau","Une entité logique manipulable, identifiée de manière unique par une URL (ex: /users/42)","Un mot de passe administrateur chiffré","Un cookie de traçage publicitaire"], c:1, e:"Dans REST, chaque objet manipulable (utilisateur, produit, commande) est une ressource ciblée par une URL spécifique." },
      { q:"Sur quel protocole réseau fondamental l'architecture REST s'appuie-t-elle quasi-exclusivement ?", o:["Le protocole FTP","Le protocole HTTP (Hypertext Transfer Protocol)","Le protocole SMTP","Le protocole SSH"], c:1, e:"REST repose sur les fondations, les méthodes et les codes de statut du protocole HTTP." },
      { q:"Quel est le rôle fondamental d'une URL au sein d'une architecture REST ?", o: ["Styliser l'affichage graphique de la réponse","Identifier de façon claire et unique une ressource ciblée","Chiffrer le contenu des messages transmis","Compiler le code source du serveur"], c:1, e:"L'URL (ou endpoint) sert d'adresse d'identification pour cibler la ressource sur laquelle on souhaite agir." },
      { q:"Quel format d'échange de données est devenu le standard dominant des API REST modernes ?", o:["Le format binaire DOCX","Le format textuel léger JSON (JavaScript Object Notation)","Le format PDF vectoriel","Le format audio MP3"], c:1, e:"JSON s'est imposé comme le format universel d'échange pour les API REST en raison de sa légèreté et de sa lisibilité." },
      { q:"Quelle propriété mathématique qualifie une requête dite « idempotente » en informatique ?", o:["Qu'elle provoque systématiquement une erreur de syntaxe","Que répéter la même requête plusieurs fois produit exactement le même état final sur le serveur","Qu'elle s'exécute de manière asynchrone","Qu'elle est strictement interdite en production"], c:1, e:"Une opération idempotente (comme un GET ou un PUT) peut être relancée plusieurs fois sans modifier davantage l'état du serveur." },
      { q:"Que favorise le principe d'« interface uniforme » prôné par l'architecture REST ?", o:["La complexité maximale du code","Une manière cohérente, normalisée et prévisible d'interagir avec l'ensemble des ressources","Le chiffrement des bases de données","Le ralentissement volontaire des requêtes"], c:1, e:"L'uniformité de l'interface rend l'API intuitive et prévisible, s'appuyant sur des méthodes et des formats normalisés." },
      { q:"Comment se positionne l'architecture REST face à son ancêtre SOAP ?", o:["REST est beaucoup plus lourd et verbeux","REST est plus léger, souple et s'appuie généralement sur du JSON","REST exige obligatoirement l'utilisation de XML strict","REST ne fonctionne pas sur le web"], c:1, e:"REST a supplanté SOAP grâce à sa légèreté, sa simplicité d'implémentation et son usage naturel de JSON." },
      { q:"Que représente l'interaction client-serveur dans un modèle REST ?", o:["Une fusion des deux entités sur la même machine","Une séparation des rôles : le client émet les requêtes d'interface, le serveur gère la logique et les ressources","Un système en pair-à-pair sans hiérarchie","Une base de données SQL autonome"], c:1, e:"Le découplage client-serveur permet à l'interface et au stockage de évoluer indépendamment l'un de l'autre." }
    ],
    /* S2 — Méthodes HTTP */
    [
      { q:"Quelle méthode HTTP standard emploie-t-on pour LIRE ou récupérer une ressource ?", o:["La méthode POST","La méthode GET","La méthode DELETE","La méthode PUT"], c:1, e:"GET est la méthode de lecture par excellence : elle récupère une ressource sans modifier le serveur." },
      { q:"Quelle méthode HTTP utilise-t-on traditionnellement pour CRÉER une nouvelle ressource ?", o:["La méthode GET","La méthode DELETE","La méthode POST","La méthode HEAD"], c:2, e:"POST transmet des données dans le corps de la requête pour ordonner au serveur la création d'une ressource." },
      { q:"Quelle méthode HTTP est conçue pour remplacer ou mettre à jour globalement une ressource existante ?", o:["La méthode PUT","La méthode GET","La méthode PATCH partielle","La méthode DELETE"], c:0, e:"PUT met à jour (ou remplace intégralement) la ressource ciblée par les données fournies." },

      { q:"À qui profite en fin de compte une conception de dataviz inclusive et accessible ?", o: ["Uniquement aux personnes daltoniennes","À l'ensemble du public, améliorant l'expérience et la clarté pour tous","À personne en particulier","Uniquement aux machines"], c:1, e:"L'accessibilité (bons contrastes, clarté, typographies lisibles) bénéficie structurellement à tous les utilisateurs." }

  sklearn: [
    /* S1 — train_test_split */

      { q:"Quel est l'objectif fondamental de la fonction train_test_split de Scikit-learn ?", o:["De trier les lignes d'un DataFrame par ordre alphabétique","De partitionner les données en un jeu d'entraînement et un jeu de test indépendant","De chiffrer les variables cibles","De normaliser les échelles de valeurs"], c:1, e:"train_test_split sépare les données pour entraîner le modèle d'un côté et évaluer sa généralisation de l'autre." },
      { q:"Que spécifie précisément l'argument test_size=0.2 passé lors de la division ?", o:["20 lignes du dataset sont réservées au test","20 % des données sont allouées au jeu de test, et 80 % à l'entraînement","20 colonnes sont ignorées","Le modèle s'entraîne sur 20 % des données"], c:1, e:"test_size=0.2 fixe la proportion du jeu de test à 20 % de la volumétrie totale." },
      { q:"À quoi sert l'utilisation de l'argument random_state dans train_test_split ?", o:["À chiffrer le mélange des données","À fixer une graine aléatoire pour rendre la répartition des données reproductible d'une exécution à l'autre","À accélérer le calcul matriciel","À trier le jeu d'entraînement"], c:1, e:"Fixer un random_state garantit que le mélange et la découpe des données seront rigoureusement identiques à chaque run." },
      { q:"Pour quelle raison est-il formellement proscrit d'évaluer un modèle sur ses données d'entraînement ?", o:["C'est interdit par la licence du logiciel","Le score obtenu sera artificiellement optimisé car le modèle a mémorisé les exemples (sur-apprentissage)","C'est techniquement impossible à programmer","Le score retourné sera toujours égal à zéro"], c:1, e:"Tester sur des données déjà vues fausse l'évaluation : le modèle a appris par cœur, il faut le tester sur de l'inédit." },
      { q:"Quels sont les quatre ensembles de données retournés classiquement par un appel à train_test_split ?", o:["train, test, validation, score","X_train, X_test, y_train, y_test","features, labels, target, model","data_in, data_out, split_in, split_out"], c:1, e:"La fonction sépare les features (X) et la cible (y) en deux jeux distincts (entraînement et test)." },
      { q:"Que représente la matrice ou le tableau X dans X_train ?", o:["La variable cible à prédire","L'ensemble des variables explicatives (features)","Le score du modèle","L'index des lignes"], c:1, e:"Par convention, X désigne les caractéristiques explicatives (features) et y la variable cible (target)." },
      { q:"Quel est le rôle du paramètre optionnel stratify=y dans train_test_split ?", o:["De trier les classes par ordre croissant","De préserver les mêmes proportions de classes dans les jeux d'entraînement et de test","De supprimer les valeurs aberrantes","D'accélérer l'entraînement"], c:1, e:"stratify=y maintient la distribution des classes, ce qui est crucial en cas de déséquilibre initial." },
      { q:"Quelle est la répartition des proportions la plus couramment adoptée pour un train_test_split ?", o:["50 % entraînement / 50 % test","80 % entraînement / 20 % test (ou 70/30)","99 % entraînement / 1 % test","10 % entraînement / 90 % test"], c:1, e:"Le ratio 80/20 est un grand classique, offrant assez de données pour apprendre et assez pour tester." },
      { q:"Quel est le comportement par défaut de train_test_split concernant l'ordre des lignes ?", o:["Il conserve scrupuleusement l'ordre initial sans modifier les lignes","Il mélange les données de manière aléatoire (shuffle=True par défaut) avant de les séparer","Il inverse systématiquement l'ordre du dataset","Il trie par valeur de la cible"], c:1, e:"Les données sont mélangées par défaut (shuffle=True) pour éviter tout biais d'ordre initial." },
      { q:"Que représente la variable y dans les jeux y_train et y_test ?", o:["Les variables explicatives secondaires","La variable cible (target) que le modèle doit apprendre à prédire","L'index des colonnes","La métrique d'évaluation"], c:1, e:"y correspond à la colonne cible (la réponse attendue par le modèle)." }

      { q:"Quelle est la force majeure de la cohérence de l'API de Scikit-learn en matière de méthodes ?", o:["Chaque modèle possède des noms de méthodes totalement différents","Presque tous les estimateurs partagent la même structure unifiée d'API (fit, predict, score)","Il n'y a aucune méthode obligatoire","Les méthodes changent selon la taille du dataset"], c:1, e:"La cohérence de l'API Scikit-learn fait que tout modèle s'utilise de la même manière (fit, predict)." },
      { q:"Dans quel contexte d'utilisation rencontre-t-on fréquemment la méthode combinée fit_transform ?", o:["Lors de la phase de prédiction finale","Lors des étapes de prétraitement et de transformation des données (ex: StandardScaler, Normalizer)","Pour tracer une courbe ROC","Pour fusionner deux tables SQL"], c:1, e:"fit_transform apprend les paramètres de transformation (ex: moyenne/écart-type) sur le train et applique la transformation en une seule étape." },
      { q:"Que prend obligatoirement en paramètre d'entrée la méthode .predict() ?", o:["La variable cible réelle y","Les variables explicatives X des nouveaux exemples à prédire","Le score attendu","Aucun paramètre"], c:1, e:"predict() prend en entrée les features X pour lesquelles on souhaite obtenir une estimation de la cible." },

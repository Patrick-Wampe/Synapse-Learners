      { q:"Selon quel critère mathématique la droite de régression linéaire est-elle ajustée par l'algorithme ?", o:["En maximisant l'erreur absolue","En minimisant la somme des carrés des résidus (méthode des moindres carrés ordinaires)","En égalisant toutes les pentes à 1","En supprimant les valeurs extrêmes"], c:1, e:"L'algorithme MCO (Moindres Carrés Ordinaires) ajuste la droite en minimisant la somme des carrés des écarts entre prédictions et réalités." },

      { q:"Que mesure le coefficient de détermination R² (attribut .score sur un régresseur) ?", o:["Le temps de calcul du modèle","La proportion de variance de la variable cible expliquée par le modèle","L'écart-type des résidus","Le nombre de lignes du jeu d'entraînement"], c:1, e:"R² varie de -inf à 1 (souvent entre 0 et 1) : plus il est proche de 1, mieux le modèle explique la variance de la cible." },
      { q:"Quel algorithme choisiriez-vous pour prédire le prix de vente d'un appartement selon sa surface et son nombre de pièces ?", o:["Une classification par KNN","Une régression linéaire","Un clustering K-Means","Une analyse de composantes principales"], c:1, e:"Le prix étant une variable continue, la régression linéaire est l'outil parfait pour ce cas." }

      { q:"Dans quel type de problématique métier privilégie-t-on la maximisation du rappel (recall) au détriment de la précision ?", o:["Dans la détection de spams publicitaires","Dans le dépistage médical d'une maladie grave (où rater un malade coûte très cher)","Dans le tri de photos de vacances","Dans la classification de couleurs"], c:1, e:"Quand rater un cas positif est critique (ex: maladie non détectée), on cherche un rappel maximal quitte à tolérer des fausses alertes." },
      { q:"Quelle fonction de Scikit-learn génère un rapport textuel complet affichant précision, rappel et F1-score par classe ?", o: ["classification_report(y_true, y_pred)","metrics_summary()","classification_score()","report_card()"], c:0, e:"classification_report() dresse un tableau synoptique détaillé des performances par classe." },
      { q:"Dans quelle situation le F1-score s'avère-t-il beaucoup plus pertinent que l'accuracy ?", o: ["Quand les classes sont parfaitement équilibrées","Quand les classes sont lourdement déséquilibrées","Uniquement en régression linéaire","Quand il n'y a qu'une seule classe"], c:1, e:"Le F1-score résiste au déséquilibre des classes en pélerant le compromis précision/rappel." },
      { q:"Que traduit une situation où un modèle présente une excellente précision mais un très faible rappel ?", o: ["Le modèle trouve tous les positifs sans exception","Le modèle est extrêmement prudent : lorsqu'il prédit du positif, c'est très fiable, mais il laisse passer beaucoup de vrais positifs","Le modèle est totalement aléatoire","Le modèle sur-apprend le bruit"], c:1, e:"Haute précision + bas rappel = peu de fausses alertes, mais beaucoup de ratés (faux négatifs)." },
      { q:"De quoi le choix de la métrique d'évaluation finale doit-il dépendre impérativement ?", o: ["De la couleur des graphiques","Des enjeux métier, des coûts respectifs des faux positifs et des faux négatifs, et de la distribution des classes","Du choix du système d'exploitation","Du nombre d'hyperparamètres testés"], c:1, e:"Le choix de la métrique est guidé par la réalité du terrain et l'impact financier ou humain des erreurs du modèle." }
    ]

  stats: [

      { q:"Comment calcule-t-on la moyenne arithmétique d'une série statistique ?", o:["En prenant la valeur située exactement au milieu","En additionnant l'ensemble des valeurs et en divisant le tout par l'effectif total","En multipliant les valeurs extrêmes entre elles","En déterminant la modalité la plus fréquente"], c:1, e:"La moyenne arithmétique s'obtient en sommant toutes les observations puis en divisant par le nombre total d'éléments." },
      { q:"Que représente la médiane d'une série statistique ordonnée ?", o:["La valeur la plus fréquemment rencontrée dans la série","La valeur centrale qui partage la distribution en deux parties d'effectifs égaux (50% au-dessus, 50% en dessous)","La somme totale des observations divisée par deux","La moyenne des valeurs extrêmes"], c:1, e:"La médiane est le point d'équilibre positionnel : la moitié des données lui est inférieure, l'autre moitié supérieure." },
      { q:"Comment définit-on le mode d'une distribution statistique ?", o:["La valeur qui possède la plus forte fréquence d'apparition (la plus courante)","La valeur centrale de la série","La différence entre le maximum et le minimum","La moyenne des carrés des écarts"], c:0, e:"Le mode (ou valeur modale) correspond à la modalité ou à la valeur qui revient le plus souvent dans l'échantillon." },

      { q:"Dans quel contexte d'analyse privilégie-t-on l'utilisation exclusive du mode ?", o:["Pour des variables numériques continues","Pour des variables qualitatives ou catégorielles (mesurer la catégorie dominante)","Pour calculer des probabilités continues","Pour tracer des régressions linéaires"], c:1, e:"Le mode s'applique naturellement aux variables qualitatives (nom, couleur, catégorie) pour identifier la modalité reine." }

      { q:"Que traduit un écart-type de valeur très faible au sein d'une série statistique ?", o:["Des valeurs extrêmement dispersées et hétérogènes","Des valeurs très concentrées et homogènes regroupées près de la moyenne","Une absence totale de moyenne","Un nombre insuffisant d'observations"], c:1, e:"Un écart-type proche de zéro indique que les observations sont très proches de la moyenne (faible variabilité)." },

      { q:"Que traduit un grand écart-type dans un jeu de données ?", o: ["Une forte homogénéité des observations","Une forte dispersion et variabilité des données par rapport à la moyenne","Une absence de valeurs aberrantes","Une distribution uniforme"], c:1, e:"Un écart-type élevé indique que les données sont éparpillées loin de la moyenne." },
      { q:"À quelle question fondamentale répondent les mesures de dispersion ?", o: ["Quel est le point central de la série ?","À quel point les observations s'écartent-elles les unes des autres ou de leur centre ?","Combien de lignes comporte le tableau ?","Quel est le mode dominant ?"], c:1, e:"Les mesures de dispersion évaluent l'éclatement et la variabilité de la population statistique." },

      { q:"Quel indicateur statistique s'avère indispensable pour comparer objectivement l'intensité de plusieurs relations différentes ?", o:["La covariance brute","Le coefficient de corrélation normalisé","La somme cumulée","L'étendue"], c:1, e:"L'échelle fixe et universelle de la corrélation (-1 à +1) permet de comparer des paires de variables hétérogènes sans ambiguïté." },
      { q:"Quel est le lien unissant le SIGNE (positif ou négatif) de la covariance et celui de la corrélation ?", o: ["Leurs signes sont toujours opposés","Leurs signes sont rigoureusement identiques pour une même paire de variables","Il n'y a aucun rapport de signe","La covariance n'a pas de signe"], c:1, e:"Corrélation et covariance partagent exactement le même signe ; seule l'échelle de grandeur change par la normalisation." },
      { q:"Quelle est la principale limite méthodologique de la covariance brute en analyse de données ?", o: ["Son incapacité à donner le signe","Son impossibilité d'être interprétée en l'absence d'une échelle de référence normalisée","Son incompatibilité avec Python","Sa lenteur de calcul"], c:1, e:"Ne disposant pas d'une borne fixe, sa magnitude brute ne permet pas de dire si le lien est « fort » ou « faible »." },
      { q:"Que conclut-on si la covariance et la corrélation de deux variables valent toutes deux exactement 0 ?", o: ["Une relation linéaire parfaite","L'absence totale de relation linéaire entre les deux variables","Une erreur d'exécution du script","Une corrélation de -1"], c:1, e:"Une valeur de 0 dans les deux indicateurs confirme l'absence de toute tendance linéaire conjointe." },
      { q:"Quel indicateur privilégie-t-on pour communiquer clairement un résultat d'analyse à un public non technique ?", o:["La covariance brute non normalisée","Le coefficient de corrélation normalisé (-1 à +1)","La variance cumulée","L'écart-type au carré"], c:1, e:"La corrélation, intuitive et bornée, est beaucoup plus explicite et parlante pour un auditoire non expert." }
    ]

  dashboard: [

      { q:"Sur quels critères ergonomiques majeurs un bon tableau de bord doit-il être conçu ?", o:["L'accumulation maximale de graphiques colorés","La clarté, la lisibilité épurée et la pertinence immédiate de l'information","La complexité technique des algorithmes sous-jacents","L'absence totale de textes explicatifs"], c:1, e:"Un dashboard réussi va droit au but : peu de visuels clairs valent mieux qu'une surcharge qui noie le message." },
      { q:"Quel doit être le tout premier point de départ lors de la conception d'un tableau de bord ?", o:["Choisir la palette de couleurs primaires","Identifier le public cible (les utilisateurs) et les questions décisionnelles auxquelles il doit répondre","Sélectionner le SGBD","Installer les bibliothèques Python"], c:1, e:"On ne conçoit pas un dashboard dans le vide : il se structure autour des besoins spécifiques de son audience et de ses enjeux." },
      { q:"Où est-il stratégiquement recommandé de positionner les indicateurs (KPI) les plus importants sur un dashboard ?", o:["Dans le coin inférieur droit, le moins visible","En haut et au centre, dans la zone où le regard se pose en premier (zone de lecture prioritaire)","De manière cachée derrière un filtre","Au hasard"], c:1, e:"L'œil humain (en lecture occidentale) démarre en haut à gauche : on y place donc les informations et KPI majeurs." },
      { q:"Quel est l'effet induit par la surcharge excessive d'informations sur un tableau de bord ?", o:["Il devient plus performant","Il nuit gravement à la compréhension, dilue l'attention et brouille le message clé","Il accélère la prise de décision","Il augmente la taille du fichier"], c:1, e:"Trop d'éléments sur un même écran saturent l'utilisateur et font perdre de vue l'essentiel." },
      { q:"En quoi un tableau de bord est-il qualifié d'« actionnable » ?", o:["Parce qu'il comporte des animations 3D","Parce qu'il doit permettre à son utilisateur de déboucher directement sur des décisions ou des actions concrètes","Parce qu'il s'exécute en ligne de commande","Parce qu'il s'efface tout seul"], c:1, e:"Un bon dashboard ne se contente pas de lister des chiffres : il aide à comprendre une situation pour agir en conséquence." },
      { q:"Quel est l'intérêt de maintenir une cohérence visuelle stricte (codes couleurs, formats) sur un dashboard ?", o:["De le rendre plus lourd en mémoire","De faciliter la lecture intuitive, d'éviter la fatigue cognitive et d'accélérer l'interprétation","D'interdire l'usage de graphiques en barres","De masquer les erreurs"], c:1, e:"Des conventions visuelles cohérentes permettent à l'utilisateur de se repérer immédiatement d'un module à l'autre." },
      { q:"Quel est l'apport fonctionnel des filtres interactifs intégrés à un tableau de bord moderne ?", o:["De figer définitivement les données","D'offrir à l'utilisateur la liberté d'explorer les données selon différents angles ou périmètres (ex: par région, par période)","De corrompre les fichiers source","De supprimer les graphiques inutiles"], c:1, e:"L'interactivité des filtres permet à l'utilisateur d'affiner sa consultation pour répondre à ses questions spécifiques." },
      { q:"Que signifie l'expression « at a glance » (en un coup d'œil) appliquée à un dashboard ?", o:["Qu'il faut une journée entière pour le lire","Que l'essentiel de l'information et des tendances majeures doit pouvoir se saisir immédiatement, en quelques secondes","Qu'il ne contient qu'une seule ligne de texte","Qu'il ne s'affiche qu'une fois"], c:1, e:"Le design d'un dashboard doit permettre de capter le statut global de la situation en un regard rapide." },

    /* S2 — KPI SMART */
    [
      { q:"Que recouvre précisément l'acronyme KPI en milieu professionnel ?", o:["Key Process Input","Key Performance Indicator (Indicateur Clé de Performance)","Known Public Info","Key Project Item"], c:1, e:"Un KPI est une métrique quantifiable choisie pour mesurer l'efficacité d'une action ou d'un objectif." },
      { q:"Dans la méthodologie d'objectifs « SMART », que signifie la lettre M ?", o:["Magique","Mesurable (quantifiable et doté d'une cible précise)","Manuel","Mineur"], c:1, e:"M comme Mesurable : l'objectif doit s'appuyer sur des chiffres tangibles et vérifiables." },
      { q:"Que désigne la lettre T dans l'acronyme SMART ?", o:["Total","Temporellement défini (Time-bound / assorti d'une échéance précise)","Technique","Trié"], c:1, e:"T comme Temporellement défini : l'objectif doit comporter une date limite ou un calendrier d'atteinte." },
      { q:"Quel est le sens de la lettre S dans la méthode d'objectifs SMART ?", o:["Simple","Spécifique (clair, précis et univoque)","Standard","Secret"], c:1, e:"S comme Spécifique : l'objectif doit cibler un élément précis sans ambiguïté." },
      { q:"Qu'est-ce qui caractérise un bon KPI utile par rapport à une simple métrique brute ?", o:["Il est toujours exprimé en texte brut","Il est mesurable, pertinent et directement relié à un objectif stratégique de l'entreprise","Il est purement décoratif","Il change tous les jours de définition"], c:1, e:"Un KPI n'est pas qu'un chiffre : il est aligné sur une stratégie et permet de piloter la performance." },
      { q:"Dans le cadre de l'approche SMART, que qualifie la lettre R (Relevant) ?", o:["La couleur rouge","La pertinence de l'objectif au regard des enjeux stratégiques globaux","La rapidité d'exécution","La répétition des calculs"], c:1, e:"R comme Relevant (pertinent) : l'objectif doit avoir du sens et être en phase avec les priorités de l'organisation." },
      { q:"Qu'appelle-t-on une « vanity metric » (métrique de vanité) en affaires ?", o:["Un KPI de performance stratégique","Un chiffre flatteur et impressionnant en apparence, mais totalement inerte pour guider l'action ou la décision","Un objectif SMART","Une médiane statistique"], c:1, e:"Les métriques de vanité (ex: nombre total de téléchargements cumulés sans désinstallations) flattent l'ego mais n'aident en rien à piloter." },
      { q:"Que garantit la lettre A (Achievable) dans la construction d'un objectif SMART ?", o: ["Qu'il est abstrait","Qu'il est atteignable et réaliste au vu des ressources disponibles","Qu'il est annulé d'avance","Qu'il est entièrement automatisé"], c:1, e:"A comme Achievable (atteignable) : fixer un objectif irréalisable démotive les équipes au lieu de les piloter." },
      { q:"Quel est l'effet pervers de multiplier sans limite le nombre de KPI affichés sur un tableau de bord ?", o:["Il devient plus précis","Il dilue l'attention, noie les messages prioritaires et perturbe la prise de décision","Il accélère le traitement informatique","Il clarifie la stratégie"], c:1, e:"Trop de KPI tuent le KPI : mieux vaut en restreindre le nombre aux plus vitaux." },

/* =====================================================================
   3. STOCKAGE (cache des séries + meilleurs scores)
   ===================================================================== */
const store = {
  async get(key){ try{ const r = await window.storage.get(key); return r ? r.value : null; }catch(e){ return mem[key] ?? null; } },
  async set(key,val){ try{ await window.storage.set(key, val); }catch(e){ mem[key] = val; } },
  async del(key){ try{ await window.storage.delete(key); }catch(e){ delete mem[key]; } },
};
const mem = {}; // repli mémoire si window.storage indisponible
const qKey = (t,s)=>`synq:q:${t}:${s}`;
const scoreKey = (t,s)=>`synq:score:${t}:${s}`;

/* =====================================================================
   4. GÉNÉRATION DES QUESTIONS via l'API Claude
   ===================================================================== */
function buildPrompt(theme, focus){
  return `Tu es l'Architecte Pédagogique de Synapse Learners, plateforme de formation Data Analyst (méthode V.E.L.M.).
Génère EXACTEMENT 10 questions de quiz à choix multiple, en FRANÇAIS, pour réviser la notion suivante.

THÈME : ${theme.label}
SOUS-THÈME (focus de cette série) : ${focus}
PÉRIMÈTRE DU THÈME : ${theme.syllabus}

RÈGLES IMPÉRATIVES :
- Chaque question a EXACTEMENT 4 options.
- Une SEULE option est correcte. Les 3 autres sont plausibles mais fausses (pas d'absurdités évidentes).
- La bonne réponse ne doit PAS être devinable sans connaître la notion.
- Couvre des angles variés : définition, lecture de code, débogage d'une erreur classique, cas métier.
- Niveau adapté à un futur data analyst junior, ancré dans le sous-thème indiqué.
- Chaque question a une explication COURTE (1 phrase, ~20 mots) qui justifie la bonne réponse.
- VÉRIFICATION OBLIGATOIRE : relis chaque item et assure-toi que l'option pointée par "correct" est réellement la seule bonne réponse, et que l'explication décrit bien CETTE option. Ne marque jamais une mauvaise option comme correcte.

FORMAT DE SORTIE : réponds UNIQUEMENT avec un tableau JSON valide, sans texte avant ni après, sans balises Markdown. Schéma de chaque élément :
{"question": "...", "options": ["A","B","C","D"], "correct": 0, "explanation": "..."}
"correct" est l'index (0 à 3) de la bonne réponse dans "options".`;
}

function extractJSONArray(text){
  if(!text) return null;
  let t = text.replace(/```json/gi,"").replace(/```/g,"").trim();
  const start = t.indexOf("[");
  if(start === -1) return null;
  t = t.slice(start);
  // Tentative directe
  try { return JSON.parse(t); } catch(e){}
  // Récupération tolérante : on garde jusqu'au dernier objet complet
  const lastObj = t.lastIndexOf("}");
  if(lastObj !== -1){
    let candidate = t.slice(0, lastObj + 1) + "]";
    try { return JSON.parse(candidate); } catch(e){}
  }
  return null;
}

function validate(arr){
  if(!Array.isArray(arr)) return [];
  return arr.filter(it =>
    it && typeof it.question === "string" && it.question.length > 3 &&
    Array.isArray(it.options) && it.options.length === 4 &&
    it.options.every(o => typeof o === "string" && o.length > 0) &&
    Number.isInteger(it.correct) && it.correct >= 0 && it.correct <= 3 &&
    typeof it.explanation === "string"
  ).map(it => ({ q: it.question, o: it.options, c: it.correct, e: it.explanation }));
}

async function callClaude(prompt){
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1000,
      messages: [{ role: "user", content: prompt }],
    }),
  });
  if(!res.ok) throw new Error("HTTP " + res.status);
  const data = await res.json();
  return (data.content || []).map(b => b.type === "text" ? b.text : "").join("");
}

// Renvoie { questions:[...], offline:bool }
async function getQuestions(theme, seriesIndex){
  const key = qKey(theme.id, seriesIndex);
  const cached = await store.get(key);
  if(cached){
    try { const arr = JSON.parse(cached); if(arr && arr.length) return { questions: arr, offline:false }; } catch(e){}
  }
  const focus = theme.series[seriesIndex];
  try {
    let raw = await callClaude(buildPrompt(theme, focus));
    let questions = validate(extractJSONArray(raw));
    // Un second essai si la première fournée est trop courte
    if(questions.length < 6){
      raw = await callClaude(buildPrompt(theme, focus));
      const more = validate(extractJSONArray(raw));
      if(more.length > questions.length) questions = more;
    }
    if(questions.length >= 6){
      questions = questions.slice(0, 10);
      await store.set(key, JSON.stringify(questions));
      return { questions, offline:false };
    }
    throw new Error("Génération insuffisante");
  } catch(e){
    const bank = FALLBACK[theme.id] || [];
    const set = bank[seriesIndex] || bank[0] || [];
    return { questions: set.slice(), offline:false };
  }
}

/* =====================================================================
   5. ÉTAT & RENDU
   ===================================================================== */
const app = document.getElementById("app");
const rail = document.getElementById("rail");
let state = { view:"home", theme:null, series:0, questions:[], idx:0, answers:[], offline:false };

function setRail(pct){ rail.style.width = Math.max(0, Math.min(100, pct)) + "%"; }
function go(view){ state.view = view; render(); window.scrollTo({ top:0, behavior:"smooth" }); }

/* ---------- HOME ---------- */
function renderHome(){
  setRail(0);
  const tiles = THEMES.map(t => `
    <button class="tile" data-theme="${t.id}">
      <span class="emoji">${t.emoji}</span>
      <span class="meta">
        <span class="name">${t.label}</span>
        <span class="sub">${t.series.length} séries · ${t.series.length*10} questions</span>
      </span>
    </button>`).join("");

  app.innerHTML = `
    <div class="screen-anim">
      <p class="eyebrow">Quiz Data Analyst</p>
      <h1 class="title">Choisis ton thème</h1>
      <p class="lede">11 thèmes du programme, des séries de 10 questions. Sélectionne un thème, puis une série pour entraîner tes synapses.</p>
      <div class="grid">${tiles}</div>
    </div>`;

  app.querySelectorAll(".tile").forEach(b =>
    b.addEventListener("click", () => { state.theme = THEMES.find(t => t.id === b.dataset.theme); state.series = 0; go("series"); }));
}

/* ---------- SÉRIES ---------- */
async function renderSeries(){
  setRail(0);
  const t = state.theme;
  const rows = await Promise.all(t.series.map(async (focus, i) => {
    const best = await store.get(scoreKey(t.id, i));
    let badge = `<span class="badge-arrow">›</span>`;
    if(best !== null){
      const n = parseInt(best, 10);
      const cls = n >= 7 ? "badge-green" : "badge-amber";
      badge = `<span class="score-badge ${cls}">${n}/10</span>`;
    }
    return `
      <button class="srow" data-series="${i}">
        <span class="num">${String(i+1).padStart(2,"0")}</span>
        <span class="meta">
          <span class="stitle">Série ${i+1}</span>
          <span class="sfocus">${focus}</span>
        </span>
        ${badge}
      </button>`;
  }));

  app.innerHTML = `
    <div class="screen-anim">
      <button class="backlink" id="back">← Tous les thèmes</button>
      <div class="series-head">
        <span class="emoji">${t.emoji}</span>
        <div>
          <p class="eyebrow" style="margin:0">${t.series.length} séries disponibles</p>
          <h1 class="title" style="margin:2px 0 0">${t.label}</h1>
        </div>
      </div>
      <div class="series-list">${rows.join("")}</div>
      <div class="hint">💡 Les questions sont générées à partir du <b>programme Synapse Learners</b> et mises en cache : une série reste identique d'une fois sur l'autre. Un badge vert (≥ 7/10) ou orange indique ton meilleur score.</div>
    </div>`;

  app.querySelector("#back").addEventListener("click", () => go("home"));
  app.querySelectorAll(".srow").forEach(b =>
    b.addEventListener("click", () => startSeries(parseInt(b.dataset.series, 10))));
}

/* ---------- LANCEMENT D'UNE SÉRIE ---------- */
async function startSeries(i){
  state.series = i;
  state.idx = 0; state.answers = [];
  // écran de chargement
  setRail(6);
  app.innerHTML = `
    <div class="loading screen-anim">
      <span class="brainpulse">🧠</span>
      <p>Génération de la série<span class="dots"></span></p>
      <small>${state.theme.label} · Série ${i+1} — ${state.theme.series[i]}</small>
    </div>`;

  const { questions, offline } = await getQuestions(state.theme, i);
  state.questions = questions;
  state.offline = offline;
  if(!questions.length){
    app.innerHTML = `
      <div class="loading screen-anim">
        <span style="font-size:42px">😕</span>
        <p>Impossible de charger cette série</p>
        <small>Vérifie ta connexion, puis réessaie.</small>
        <div style="margin-top:18px"><button class="btn" id="retry">Réessayer</button></div>
      </div>`;
    app.querySelector("#retry").addEventListener("click", () => startSeries(i));
    return;
  }
  go("quiz");
}

/* ---------- QUIZ ---------- */
function renderQuiz(){
  const total = state.questions.length;
  const q = state.questions[state.idx];
  const answered = state.answers[state.idx] !== undefined;
  const score = state.answers.filter((a, k) => a === state.questions[k].c).length;
  setRail(((state.idx + (answered ? 1 : 0)) / total) * 100);

  const offlineTag = state.offline
    ? `<div class="offline-tag">⚡ </div>` : "";

  const opts = q.o.map((opt, k) => {
    let cls = "opt";
    if(answered){
      cls += " locked";
      if(k === q.c) cls += " correct";
      else if(k === state.answers[state.idx]) cls += " wrong";
    }
    let mark = "";
    if(answered && k === q.c) mark = `<span class="mark">✓</span>`;
    else if(answered && k === state.answers[state.idx]) mark = `<span class="mark">✕</span>`;
    return `<button class="${cls}" data-opt="${k}" ${answered ? "disabled" : ""}>${opt}${mark}</button>`;
  }).join("");

  let feedback = "";
  if(answered){
    const ok = state.answers[state.idx] === q.c;
    const last = state.idx === total - 1;
    feedback = `
      <div class="feedback">
        <h4 class="${ok ? "ok" : "no"}">${ok ? "✅ Bien vu !" : "❌ Pas tout à fait…"}</h4>
        <p>${q.e}</p>
        <button class="btn" id="next">${last ? "Voir les résultats" : "Question suivante →"}</button>
      </div>`;
  }

  app.innerHTML = `
    <div class="screen-anim">
      <button class="backlink" id="back">← Quitter la série</button>
      ${offlineTag}
      <div class="qtop">
        <span class="pill">Question ${state.idx + 1}/${total}</span>
        <span class="score">Score : <b>${score}/${total}</b></span>
      </div>
      <div class="question">${q.q}</div>
      <div class="opts">${opts}</div>
      ${feedback}
    </div>`;

  app.querySelector("#back").addEventListener("click", () => go("series"));
  if(!answered){
    app.querySelectorAll(".opt").forEach(b =>
      b.addEventListener("click", () => { state.answers[state.idx] = parseInt(b.dataset.opt, 10); render(); }));
  } else {
    app.querySelector("#next").addEventListener("click", () => {
      if(state.idx < total - 1){ state.idx++; render(); }
      else finishQuiz();
    });
  }
}

/* ---------- RÉSULTATS ---------- */
async function finishQuiz(){
  const total = state.questions.length;
  const score = state.answers.filter((a, k) => a === state.questions[k].c).length;

  // sauvegarde du meilleur score
  let saved = false;
  if(!state.offline){
    const prev = await store.get(scoreKey(state.theme.id, state.series));
    if(prev === null || score > parseInt(prev, 10)){ await store.set(scoreKey(state.theme.id, state.series), String(score)); }
    saved = true;
  }
  state._score = score; state._saved = saved;
  go("results");
}

function renderResults(){
  setRail(100);
  const total = state.questions.length;
  const score = state._score;
  const pct = Math.round((score / total) * 100);
  let verdict;
  if(pct >= 90) verdict = "Maîtrise impressionnante. Tes synapses sont au top — passe à la série suivante !";
  else if(pct >= 70) verdict = "Solide ! Quelques notions à consolider, mais l'essentiel est acquis.";
  else if(pct >= 40) verdict = "Bonne base. Relis les explications ci-dessous puis retente la série.";
  else verdict = "Ça vaut le coup de revoir le cours sur ce thème avant de réessayer. Persévère !";

  const reviews = state.questions.map((q, k) => {
    const a = state.answers[k];
    const ok = a === q.c;
    return `
      <div class="rev">
        <p class="rq">${k+1}. ${q.q}</p>
        <div class="line"><span class="lab">Ta réponse</span>
          <span class="${ok ? "yours-ok" : "yours-no"}">${ok ? "✓" : "✕"} ${q.o[a]}</span></div>
        ${ok ? "" : `<div class="line"><span class="lab">Bonne réponse</span><span class="good">✓ ${q.o[q.c]}</span></div>`}
        <div class="why"><p class="lab2">Pourquoi ?</p><p>${q.e}</p></div>
      </div>`;
  }).join("");

  const savedPill = state._saved
    ? `<div class="saved">✓ Résultat sauvegardé</div>`
    : `<div class="offline-tag" style="margin:0">⚡ Score</div>`;

  app.innerHTML = `
    <div class="screen-anim">
      <div class="result-top">
        <div class="scorb"><span>${score}/${total}<small>${pct}%</small></span></div>
        <h2>Analyse de tes synapses terminée !</h2>
        ${savedPill}
        <p class="verdict">${verdict}</p>
      </div>
      <div class="review">${reviews}</div>
      <div class="result-actions">
        <button class="btn" id="retry">↻ Refaire la série</button>
        <button class="btn ghost" id="other">Choisir une autre série</button>
      </div>
    </div>`;

  app.querySelector("#retry").addEventListener("click", () => startSeries(state.series));
  app.querySelector("#other").addEventListener("click", () => go("series"));
}

/* ---------- Routeur ---------- */
function render(){
  if(state.view === "home") return renderHome();
  if(state.view === "series") return renderSeries();
  if(state.view === "quiz") return renderQuiz();
  if(state.view === "results") return renderResults();
}

render();
</script>
